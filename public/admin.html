<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MyHealth Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;600&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#1a7a4a;--green-deep:#0f5c35;--green-light:#e8f5ee;--surface:#1a1a1a;--card:#242424;--border:#2e2e2e;--text:#f0f0f0;--muted:#888;--coral:#e05252;--amber:#c47a1a;--radius:18px;--radius-sm:12px}
body{background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:40px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.logo{font-family:Fraunces,serif;font-size:20px;color:var(--green)}
.badge{background:var(--coral);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.content{padding:16px;max-width:700px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.btn{padding:10px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-coral{background:var(--coral);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-sec{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;padding:14px;font-size:14px}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.avatar-sm{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:11px;color:var(--muted);margin-top:2px}
.blocked-badge{background:#3d1515;color:var(--coral);font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-tile{background:var(--surface);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tab{flex:1;padding:10px;background:var(--card);border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--green);color:#fff;font-weight:700}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:vertical;min-height:80px}
.msg-row{padding:12px 0;border-bottom:1px solid var(--border)}
.msg-row:last-child{border-bottom:none}
.login-box{max-width:360px;margin:80px auto;padding:0 20px}
.err{color:var(--coral);font-size:13px;text-align:center;margin-top:10px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">MyHealth</div>
  <div class="badge">Admin</div>
  <div style="flex:1"></div>
  <button id="back-btn" onclick="window.location='/'" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif">← App</button>
  <button id="logout-btn" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif;margin-left:8px">Sair</button>
</div>

<div id="login-box" class="login-box" style="display:none">
  <div style="font-family:Fraunces,serif;font-size:26px;color:var(--green);text-align:center;margin-bottom:24px">Admin MyHealth</div>
  <div class="field"><label>Email</label><input id="a-email" type="email" placeholder="admin@email.com"></div>
  <div class="field"><label>Senha</label><input id="a-pass" type="password" placeholder="••••••"></div>
  <button class="btn btn-green btn-full" onclick="doLogin()">Entrar</button>
  <div id="a-err" class="err"></div>
</div>

<div id="denied-box" style="display:none;text-align:center;padding:80px 20px">
  <div style="font-size:48px;margin-bottom:16px">🔒</div>
  <div style="font-size:18px;font-weight:600;margin-bottom:8px">Acesso negado</div>
  <div style="font-size:14px;color:var(--muted)">Esta área é restrita ao administrador.</div>
</div>

<div id="main" style="display:none">
  <div class="content">
    <div class="stats-row">
      <div class="stat-tile"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Usuários</div></div>
      <div class="stat-tile"><div class="stat-val" id="stat-blocked">—</div><div class="stat-lbl">Bloqueados</div></div>
      <div class="stat-tile"><div class="stat-val" id="stat-active">—</div><div class="stat-lbl">Ativos 7d</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">👥 Usuários</button>
      <button class="tab" onclick="switchTab('messages')">📢 Mensagens</button>
    </div>

    <!-- Users tab -->
    <div id="tab-users">
      <div class="card">
        <div class="sec-label">Todos os usuários</div>
        <div id="users-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Messages tab -->
    <div id="tab-messages" style="display:none">
      <div class="card">
        <div class="sec-label">Enviar mensagem</div>
        <div class="field">
          <label>Destinatário</label>
          <select id="msg-to">
            <option value="all">📢 Todos os usuários</option>
          </select>
        </div>
        <div class="field"><label>Assunto</label><input id="msg-subject" type="text" placeholder="Ex: Atualização importante"></div>
        <div class="field"><label>Mensagem</label><textarea id="msg-body" placeholder="Digite sua mensagem..."></textarea></div>
        <button class="btn btn-green btn-full" onclick="sendMessage()">Enviar mensagem</button>
      </div>
      <div class="card">
        <div class="sec-label">Histórico de mensagens</div>
        <div id="messages-list"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Block confirm modal -->
<div id="block-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--card);border-radius:var(--radius);padding:24px;max-width:320px;width:100%;text-align:center">
    <div style="font-size:32px;margin-bottom:12px" id="bm-icon">🔒</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px" id="bm-title">Bloquear usuário?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px" id="bm-name"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sec" style="flex:1" onclick="closeBlockModal()">Cancelar</button>
      <button class="btn btn-coral" style="flex:1" id="bm-confirm" onclick="confirmBlock()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyALZguDLc-eqlQO1oq0SXFnPw-xfLIM9y8",
  authDomain: "myhealth-app-d8acf.firebaseapp.com",
  projectId: "myhealth-app-d8acf",
  storageBucket: "myhealth-app-d8acf.firebasestorage.app",
  messagingSenderId: "422827888",
  appId: "1:422827888:web:230078ee65d4f44ee521b5"
};
firebase.initializeApp(firebaseConfig);
var fbAuth = firebase.auth();
var fbDb = firebase.firestore();
var ADMIN_EMAIL = 'walter@camposhq.com';
var allUsers = [];
var blockTarget = null;
var blockAction = null;
var currentTab = 'users';

function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab-users').style.display = tab==='users'?'block':'none';
  document.getElementById('tab-messages').style.display = tab==='messages'?'block':'none';
  document.querySelectorAll('.tab').forEach(function(b,i){ b.className='tab'+((['users','messages'][i]===tab)?' active':''); });
  if(tab==='messages') loadMessages();
}

fbAuth.onAuthStateChanged(function(user){
  if(!user){ document.getElementById('login-box').style.display='block'; return; }
  if(user.email.toLowerCase() !== ADMIN_EMAIL){ document.getElementById('denied-box').style.display='block'; return; }
  document.getElementById('main').style.display='block';
  document.getElementById('logout-btn').addEventListener('click', function(){ fbAuth.signOut(); });
  loadUsers();
});

function doLogin(){
  var email = document.getElementById('a-email').value.trim();
  var pass = document.getElementById('a-pass').value;
  document.getElementById('a-err').textContent='';
  if(!email||!pass){ document.getElementById('a-err').textContent='Preencha email e senha.'; return; }
  fbAuth.signInWithEmailAndPassword(email, pass).catch(function(e){
    document.getElementById('a-err').textContent = 'Email ou senha incorretos.';
  });
}

function loadUsers(){
  fbDb.collection('users').get().then(function(snap){
    allUsers = snap.docs.map(function(d){ return Object.assign({uid:d.id}, d.data()); });
    var blocked = allUsers.filter(function(u){ return u.blocked; }).length;
    var week = new Date(); week.setDate(week.getDate()-7);
    var active = allUsers.filter(function(u){
      if(!u.lastLogin) return false;
      var ts = u.lastLogin.seconds ? new Date(u.lastLogin.seconds*1000) : new Date(u.lastLogin);
      return ts > week;
    }).length;
    document.getElementById('stat-total').textContent = allUsers.length;
    document.getElementById('stat-blocked').textContent = blocked;
    document.getElementById('stat-active').textContent = active;
    renderUsers(allUsers);
    // populate recipient dropdown
    var sel = document.getElementById('msg-to');
    sel.innerHTML = '<option value="all">📢 Todos os usuários</option>';
    allUsers.forEach(function(u){
      var opt = document.createElement('option');
      opt.value = u.uid;
      opt.textContent = (u.name||'Sem nome') + ' · ' + (u.email||'');
      sel.appendChild(opt);
    });
  }).catch(function(e){ document.getElementById('users-list').innerHTML='<div style="color:var(--muted);font-size:13px">Erro ao carregar usuários. Verifique as regras do Firestore.</div>'; });
}

function renderUsers(users){
  if(!users.length){ document.getElementById('users-list').innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Nenhum usuário ainda.</div>'; return; }
  var h='';
  users.forEach(function(u){
    var initials = (u.name||u.email||'?').charAt(0).toUpperCase();
    var lastLogin = u.lastLogin ? new Date(u.lastLogin.seconds?u.lastLogin.seconds*1000:u.lastLogin).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Nunca';
    h+='<div class="user-row">';
    h+='<div class="avatar-sm">'+initials+'</div>';
    h+='<div class="user-info">';
    h+='<div class="user-name">'+(u.name||'Sem nome')+(u.blocked?' <span class="blocked-badge">Bloqueado</span>':'')+'</div>';
    h+='<div class="user-email">'+(u.email||'')+'</div>';
    h+='<div class="user-meta">Último acesso: '+lastLogin+'</div>';
    h+='</div>';
    h+='<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">';
    if(u.blocked){
      h+='<button class="btn btn-green" onclick="openBlockModal(\''+u.uid+'\',\''+escHtml(u.name||u.email||'')+'\',false)" style="padding:6px 12px;font-size:12px">Desbloquear</button>';
    } else {
      h+='<button class="btn btn-coral" onclick="openBlockModal(\''+u.uid+'\',\''+escHtml(u.name||u.email||'')+'\',true)" style="padding:6px 12px;font-size:12px">Bloquear</button>';
    }
    h+='</div></div>';
  });
  document.getElementById('users-list').innerHTML = h;
}

function escHtml(s){ return s.replace(/'/g,"\\'"); }

function openBlockModal(uid, name, block){
  blockTarget = uid; blockAction = block;
  document.getElementById('bm-icon').textContent = block ? '🔒' : '🔓';
  document.getElementById('bm-title').textContent = block ? 'Bloquear usuário?' : 'Desbloquear usuário?';
  document.getElementById('bm-name').textContent = name;
  document.getElementById('bm-confirm').className = 'btn '+(block?'btn-coral':'btn-green');
  document.getElementById('bm-confirm').textContent = block ? 'Bloquear' : 'Desbloquear';
  document.getElementById('block-modal').style.display='flex';
}
function closeBlockModal(){ document.getElementById('block-modal').style.display='none'; blockTarget=null; blockAction=null; }

function confirmBlock(){
  if(!blockTarget) return;
  fbDb.collection('users').doc(blockTarget).set({blocked: blockAction}, {merge:true}).then(function(){
    toast(blockAction ? 'Usuário bloqueado.' : 'Usuário desbloqueado.');
    closeBlockModal();
    loadUsers();
  }).catch(function(){ toast('Erro. Verifique as regras do Firestore.'); });
}

function sendMessage(){
  var to = document.getElementById('msg-to').value;
  var subj = document.getElementById('msg-subject').value.trim();
  var body = document.getElementById('msg-body').value.trim();
  if(!subj||!body){ toast('Preencha assunto e mensagem.'); return; }
  fbDb.collection('messages').add({
    toUid: to,
    subject: subj,
    body: body,
    fromAdmin: true,
    read: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    toast('Mensagem enviada!');
    document.getElementById('msg-subject').value='';
    document.getElementById('msg-body').value='';
    loadMessages();
  }).catch(function(){ toast('Erro ao enviar. Verifique as regras do Firestore.'); });
}

function loadMessages(){
  fbDb.collection('messages').orderBy('createdAt','desc').limit(20).get().then(function(snap){
    if(snap.empty){ document.getElementById('messages-list').innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Nenhuma mensagem enviada.</div>'; return; }
    var h='';
    snap.docs.forEach(function(doc){
      var m = doc.data();
      var to = m.toUid==='all'?'Todos':allUsers.find(function(u){return u.uid===m.toUid;});
      var toName = m.toUid==='all'?'📢 Todos':(to?(to.name||to.email):'Usuário');
      var dt = m.createdAt&&m.createdAt.seconds?new Date(m.createdAt.seconds*1000).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      h+='<div class="msg-row">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
      h+='<div style="font-size:13px;font-weight:600">'+m.subject+'</div>';
      h+='<div style="font-size:11px;color:var(--muted)">'+dt+'</div>';
      h+='</div>';
      h+='<div style="font-size:12px;color:var(--muted);margin-bottom:4px">Para: '+toName+'</div>';
      h+='<div style="font-size:13px;color:var(--text)">'+m.body+'</div>';
      h+='</div>';
    });
    document.getElementById('messages-list').innerHTML=h;
  }).catch(function(){ document.getElementById('messages-list').innerHTML='<div style="color:var(--muted);font-size:13px">Erro ao carregar.</div>'; });
}
</script>
</body>
</html>
