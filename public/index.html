function renderExames(){
  renderProfiles('exames-profiles');
  document.getElementById('exames-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var cats = ['todos','energia','metabolismo','cardiovascular'];
  var catLabels = ['Todos','⚡ Energia','🔥 Metabolismo','❤️ Cardio'];
  var th = '';
  cats.forEach(function(t,i){
    th += '<button class="tab" style="'+(examesTab===t?'background:var(--coral);color:#fff;border-color:var(--coral)':'')+'" data-etab="'+t+'">'+catLabels[i]+'</button>';
  });
  document.getElementById('exames-tabs').innerHTML = th;
  document.querySelectorAll('[data-etab]').forEach(function(btn){
    btn.addEventListener('click', function(){ examesTab=this.dataset.etab; renderExames(); });
  });
  renderExamesContent();
}

function getExamHistory(){
  var o = pdOverride[curP];
  if(!o || !o.examHistory) return [];
  // migrate old entries that only have month+year in dateLabel
  return o.examHistory.map(function(e){
    if(e.date && e.dateLabel && !/\d{2}/.test(e.dateLabel.split(' ')[0])){
      var d = new Date(e.date+'T12:00:00');
      e.dateLabel = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    }
    return e;
  });
}

function renderExamesContent(){
  var p = PD[curP];
  var history = getExamHistory();
  var current = history.length > 0 ? history[history.length-1].values : {};
  var previous = history.length > 1 ? history[history.length-2].values : null;
  var h = '';

  var GROUPS_MAP = {energia:['vitd','ferro','vitb12'], metabolismo:['testo','tsh','gli'], cardiovascular:['pce','trig','hdl']};
  var visMarkers = examesTab==='todos' ? EXAM_MARKER_DEFS : EXAM_MARKER_DEFS.filter(function(m){ return (GROUPS_MAP[examesTab]||[]).indexOf(m.key)>=0; });

  h += '<div class="section" style="display:flex;gap:10px">';
  h += '<button id="e-add-new" style="flex:1;padding:13px;border:2px dashed var(--coral);border-radius:var(--radius-sm);background:none;color:var(--coral);font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">+ Nova medicao</button>';
  h += '<button id="e-upload-exam" style="flex:1;padding:13px;border:2px dashed var(--blue);border-radius:var(--radius-sm);background:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">📎 Enviar exame</button>';
  h += '</div>';

  var allVals = EXAM_MARKER_DEFS.map(function(m){ return {m:m,v:parseFloat(current[m.key])}; }).filter(function(x){ return !isNaN(x.v); });
  var normais = allVals.filter(function(x){ return x.v>=x.m.refLow && x.v<=x.m.refHigh; }).length;
  var alertas = allVals.filter(function(x){ return x.v<x.m.refLow||x.v>x.m.refHigh; }).length;
  var atencao = allVals.length - normais - alertas;

  if(allVals.length===0){
    h += '<div class="section"><div style="text-align:center;padding:40px 20px">';
    h += '<div style="font-size:48px;margin-bottom:12px">🧪</div>';
    h += '<div style="font-size:16px;font-weight:500;margin-bottom:8px">Sem exames registrados</div>';
    h += '<div style="font-size:13px;color:var(--muted);margin-bottom:20px">Adicione seus resultados para acompanhar a evolucao e receber recomendacoes personalizadas da IA.</div>';
    h += '<button id="e-add-first" style="background:var(--coral);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif">+ Adicionar exames</button>';
    h += '</div></div>';
  } else {
    h += '<div class="section"><div class="stats">';
    h += '<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+normais+'</div><div class="stat-lbl">Normais</div></div>';
    h += '<div class="stat-card"><div class="stat-val" style="color:var(--amber)">'+atencao+'</div><div class="stat-lbl">Atencao</div></div>';
    h += '<div class="stat-card"><div class="stat-val" style="color:var(--coral)">'+alertas+'</div><div class="stat-lbl">Alertas</div></div>';
    h += '</div></div>';

    h += '<div class="section">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
    h += '<div class="sec-label" style="margin:0">Ultima medicao: '+(history[history.length-1].dateLabel||'')+'</div>';
    if(history.length>1) h += '<div style="font-size:11px;color:var(--muted)">'+history.length+' medicoes</div>';
    h += '</div>';

    visMarkers.forEach(function(m){
      var v = parseFloat(current[m.key]);
      if(isNaN(v)) return;
      var isLow = v < m.refLow;
      var isHigh = m.refHigh < 999 && v > m.refHigh;
      var isOk = !isLow && !isHigh;
      var color = isOk ? 'var(--green)' : 'var(--coral)';
      var statusLbl = isOk ? 'Normal' : isLow ? 'Baixo' : 'Alto';
      var pct = m.refHigh < 999
        ? Math.min(100,Math.max(0,((v-m.refLow)/(m.refHigh-m.refLow))*100))
        : Math.min(100,(v/(m.refLow*1.8))*100);

      var trendH = '';
      if(previous && previous[m.key]!=null){
        var prev = parseFloat(previous[m.key]);
        if(!isNaN(prev) && prev!==v){
          var diff = v - prev;
          var trendIcon = diff>0 ? '↑' : '↓';
          var trendColor = isOk ? 'var(--green)' : 'var(--coral)';
          trendH = '<span style="font-size:11px;color:'+trendColor+';font-weight:600;margin-right:6px">'+trendIcon+(diff>0?'+':'')+diff.toFixed(1)+'</span>';
        }
      }

      h += '<div class="card" style="padding:12px 16px;margin-bottom:8px">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
      h += '<span style="font-size:13px;font-weight:500;color:var(--text)">'+m.n+'</span>';
      h += '<div style="display:flex;align-items:center">'+trendH;
      h += '<span style="font-size:16px;font-weight:700;font-family:DM Mono,monospace;color:'+color+'">'+v+'</span>';
      h += '<span style="font-size:11px;color:var(--muted);margin-left:3px">'+m.u+'</span></div></div>';
      h += '<div style="height:5px;background:#eee;border-radius:3px;margin-bottom:4px">';
      h += '<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px"></div></div>';
      h += '<div style="display:flex;justify-content:space-between">';

function snapshotHistory(idx){
  var p = PD[idx];
  if(!p || !p.weight) return;
  var imc = parseFloat((p.weight/Math.pow(p.height/100,2)).toFixed(1));
  var avg = p.scores ? Math.round((p.scores.Saude+p.scores.Fitness+p.scores.Sono+p.scores.Nutricao)/4) : 0;
  var today = new Date();
  // use daily date format (consistent with handleDayChange)
  var dateKey = today.toISOString().slice(0,10);
  var label = today.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  if(!historyData[idx]) historyData[idx]=[];
  var existing = historyData[idx].findIndex(function(e){ return e.date===dateKey; });
  var kcalToday=kcalConsumedToday(idx); var gastoToday=getBasalKcal(p)+calcWorkoutKcalToday(idx);
  var waterMl=Math.round((waterGlasses[idx+'-water']||0)*250);
  var sleepEntry=sleepData[idx]||{hours:p.sleep};
  var entry = {
    date:dateKey, label:label, weight:p.weight, imc:imc,
    fat:historyData[idx].length>0?(historyData[idx][historyData[idx].length-1].fat||null):null,
    sleep:sleepEntry.hours||p.sleep||0, avg:avg,
    scores:{Saude:p.scores.Saude,Fitness:p.scores.Fitness,Sono:p.scores.Sono,Nutricao:p.scores.Nutricao},
    calories:kcalToday>0?kcalToday:p.calories||0,
    gasto:gastoToday, deficit:kcalToday>0?kcalToday-gastoToday:null,
    water:waterMl>0?waterMl:null
  };
  if(existing>=0) historyData[idx][existing]=entry;
  else historyData[idx].push(entry);
  historyData[idx].sort(function(a,b){ return a.date<b.date?-1:1; });
  save(true);
}

function sparklineSVG(values, labels, color, tgt){
  // filter out null/undefined values keeping aligned labels
  var filteredVals=[], filteredLabels=[];
  (values||[]).forEach(function(v,i){ if(v!=null&&!isNaN(parseFloat(v))){ filteredVals.push(parseFloat(v)); filteredLabels.push(labels&&labels[i]?labels[i]:''); } });
  values=filteredVals; labels=filteredLabels;
  var vw=340, vh=160, padL=38, padR=18, padT=22, padB=26;
  var innerW=vw-padL-padR, innerH=vh-padT-padB;
  if(!values||values.length<1) return '<div style="height:120px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)">Sem historico ainda</div>';
  // scale includes target so goal line is always visible
  var allVals = tgt!=null ? values.concat([tgt]) : values;
  var dataMin=Math.min.apply(null,allVals), dataMax=Math.max.apply(null,allVals);
  var rng=dataMax-dataMin||1;
  var dMin=Math.max(0,dataMin-rng*0.18), dMax=dataMax+rng*0.18, dRng=dMax-dMin||1;
  var toX=function(i){ return padL+(values.length>1?i/(values.length-1):0.5)*innerW; };
  var toY=function(v){ return padT+innerH-((v-dMin)/dRng)*innerH; };
  var pts=values.map(function(v,i){ return {x:toX(i),y:toY(v),v:v}; });
  var gid='g'+Math.random().toString(36).slice(2,7);
  var svg='<svg width="100%" viewBox="0 0 '+vw+' '+vh+'" style="display:block;overflow:visible">';
  svg+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.28"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>';
  // grid + y-axis labels (4 steps)
  var steps=4;
  for(var gi=0;gi<=steps;gi++){
    var gv=dMin+(dRng/steps)*gi;
    var gy=toY(gv);
    svg+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(padL+innerW)+'" y2="'+gy.toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>';
    svg+='<text x="'+(padL-5)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9" fill="#aaa">'+Math.round(gv)+'</text>';
  }
  // target dashed line
  if(tgt!=null){
    var tgtY=toY(tgt);
    svg+='<line x1="'+padL+'" y1="'+tgtY.toFixed(1)+'" x2="'+(padL+innerW)+'" y2="'+tgtY.toFixed(1)+'" stroke="#b45309" stroke-width="1.8" stroke-dasharray="5 4" opacity="0.85"/>';
    svg+='<text x="'+(padL+innerW)+'" y="'+(tgtY-5)+'" text-anchor="end" font-size="9" fill="#b45309" font-weight="700">★ meta</text>';
  }
  // area
  var pathD=pts.map(function(p,i){ return (i===0?'M':'L')+p.x.toFixed(1)+' '+p.y.toFixed(1); }).join(' ');
  var areaD=pathD+' L'+pts[pts.length-1].x.toFixed(1)+' '+(padT+innerH)+' L'+padL+' '+(padT+innerH)+' Z';
  svg+='<path d="'+areaD+'" fill="url(#'+gid+')"/>';
  // line
  svg+='<path d="'+pathD+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  // dots, value labels, x-axis labels
  pts.forEach(function(pt,i){
    svg+='<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="4.5" fill="'+color+'" stroke="white" stroke-width="2"/>';
    svg+='<text x="'+pt.x.toFixed(1)+'" y="'+(pt.y-10)+'" text-anchor="middle" font-size="9.5" fill="'+color+'" font-weight="700">'+pt.v+'</text>';
    if(labels&&labels[i]){
      // convert "22 de abr." → "22/abr", "abr. 26" → "abr/26"
      var lbl=labels[i].replace(/\s+de\s+/,'/').replace(/\.\s*/,'/').replace(/\/$/,'').trim();
      if(lbl.length>7) lbl=lbl.slice(0,7);
      svg+='<text x="'+pt.x.toFixed(1)+'" y="'+(padT+innerH+16)+'" text-anchor="middle" font-size="9" fill="#888">'+lbl+'</text>';
    }
  });
  svg+='</svg>';
  return svg;
}

function evoCard(title, icon, values, labels, current, unit, color, lowerBetter, tgt){
  if(!values) values=[];
  // filter nulls for delta calculation
  var validVals = values.filter(function(v){ return v!=null&&!isNaN(parseFloat(v)); });
  var first = validVals.length>1?validVals[0]:null;
  var diff = first!==null&&current!=null?parseFloat((current-first).toFixed(1)):null;
  var isGood = diff===null?null:(lowerBetter?diff<0:diff>0);
  var deltaHtml='';
  if(diff!==null&&diff!==0){
    var dClass=isGood?'evo-delta-up':'evo-delta-down';
    deltaHtml='<div class="'+dClass+'">'+(diff>0?'▲ +':diff<0?'▼ ':'')+diff+' '+unit+' vs início</div>';
  } else if(diff===0){
    deltaHtml='<div class="evo-delta-flat">Sem mudança</div>';
  }
  // target badge
  var tgtBadge='';
  if(tgt!=null){
    var atTgt = lowerBetter ? current<=tgt : current>=tgt;
    var gapToTgt = lowerBetter ? parseFloat((current-tgt).toFixed(1)) : parseFloat((tgt-current).toFixed(1));
    if(atTgt){
      tgtBadge='<div style="font-size:10px;color:#b45309;font-weight:700">🏆 Meta atingida</div>';
    } else {
      tgtBadge='<div style="font-size:10px;color:#b45309">Faltam '+gapToTgt+' '+unit+' p/ meta</div>';
    }
  }
  var currentDisplay = (current==null||current===undefined) ? '—' : current;
  var h='<div class="evo-card">';
  h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">';
  h+='<div><span style="font-size:13px;font-weight:500;color:var(--text)">'+icon+' '+title+'</span>'+tgtBadge+'</div>';
  h+='<div style="text-align:right"><div class="evo-val" style="color:'+(current==null?'var(--muted)':color)+'">'+currentDisplay+'<span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:2px">'+(current==null?'':unit)+'</span></div>'+deltaHtml+'</div>';
  h+='</div>';
  h+='<div style="margin:0 -4px">'+sparklineSVG(values, labels, color, tgt)+'</div>';
  h+='</div>';
  return h;
}

function renderEvolucao(){

function suggestMealByHour(meals, hour){
  // find meal whose time is closest and <= photo hour (or first meal if none)
  var best = null, bestDiff = Infinity;
  meals.forEach(function(m){
    if(!m.time) return;
    var parts = m.time.split(':'); var mh = parseInt(parts[0]), mm = parseInt(parts[1]||0);
    var mMins = mh*60+mm; var pMins = hour*60;
    var diff = pMins - mMins;
    if(diff >= 0 && diff < bestDiff){ bestDiff = diff; best = m.id; }
  });
  return best || (meals[0] && meals[0].id) || null;
}

function addPhotoFoodsToMeal(mealId, aiReply){
  var p = PD[curP];
  var meal = p.meals.find(function(m){ return m.id===mealId; });
  if(!meal) return;
  // Ask AI to extract foods as JSON from the analysis already in chatHistory
  var jsonInstr = 'Com base na analise da foto que acabou de fazer, retorne SOMENTE um JSON valido, sem texto, sem markdown:\n{"foods":[{"n":"Nome do alimento","p":"porcao estimada","k":0}],"kcal":0}\nOs campos "k" sao as calorias de cada item. "kcal" e o total da refeicao.';
  var msgs = [{role:'user',content:[{type:'text',text:'(foto ja analisada anteriormente)'}]},{role:'assistant',content:aiReply},{role:'user',content:jsonInstr}];
  showToast('Adicionando ao plano...');
  fetch('/api/claude',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:600, system:'Retorne apenas JSON valido conforme solicitado.', messages:msgs})
  }).then(function(r){ return r.json(); }).then(function(data){
    if(!data.content||!data.content[0]||!data.content[0].text) throw new Error();
    var txt = data.content[0].text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    var parsed = JSON.parse(txt);
    if(Array.isArray(parsed.foods) && parsed.foods.length>0){
      // Replace meal foods with photographed foods, scaling kcal to match planned total
      var plannedKcal = meal.kcal; // preserve original planned kcal
      var photoTotal = parsed.foods.reduce(function(s,f){ return s+(f.k||0); }, 0) || parsed.kcal || 1;
      var ratio = plannedKcal / photoTotal;
      meal.foods = parsed.foods.map(function(f){
        return {n:f.n, p:f.p, k:Math.round((f.k||0)*ratio)};
      });
      meal.kcal = plannedKcal; // total stays exactly the same
      if(!pdOverride[curP]) pdOverride[curP]={};
      pdOverride[curP].meals = p.meals;
      save();
      showToast('Refeicao registrada em "'+meal.name+'" ✓');
      closeChat();
      showScreen('dieta');
    } else { throw new Error(); }
  }).catch(function(){
    showToast('Nao foi possivel adicionar. Tente manualmente.');
  });
}

function getExamInputsText(){
  var inputs = P.examInputs||{};
  var lines = [];
  EXAM_MARKER_DEFS.forEach(function(m){
    var v = parseFloat(inputs[m.key]);
    if(isNaN(v)) return;
    var flag = v < m.refLow ? '⚠️ BAIXO' : v > m.refHigh ? '⚠️ ALTO' : '✓ OK';
    lines.push(m.n+': '+v+' '+m.u+' (ref: '+m.refLow+'–'+m.refHigh+') '+flag);
  });
  if(!lines.length) return '';
  return 'Exames laboratoriais informados pelo usuario:\n'+lines.join('\n');
}

function getExamsText(p){
  if(!p.exams || !p.exams.length) return '';
  var lines = ['Exames laboratoriais recentes:'];
  p.exams.forEach(function(ex){
    var status = ex.status==='danger'?'CRITICO':ex.status==='alert'?'ATENCAO':'OK';
    var markers = ex.markers.map(function(m){
      var flag = m.c==='#c0392b'?'⚠️ BAIXO':m.c==='#c47a1a'?'⚠️ LIMÍTROFE':'✓ OK';
      return m.n+': '+m.v+' '+m.u+' (ref: '+m.ref+') '+flag;
    }).join(', ');
    lines.push('- '+ex.name+' ['+ex.date+'] ['+status+']: '+markers);
  });
  return lines.join('\n');
}

  }
  if(!customGreeting) chatSystemExtra = '';

function addChatMsg(role, text, showApply){
  var msgs = document.getElementById('chat-msgs');
  var time = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var div = document.createElement('div'); div.className='msg '+role;
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  div.innerHTML = '<div class="msg-bbl">'+safe+'</div><div class="msg-time">'+time+'</div>';

    div.appendChild(btn);
  }
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){

function sendMsg(){
  var inp = document.getElementById('chat-inp'); var text = inp.value.trim();
  if(!text||isTyping) return;
  inp.value=''; inp.style.height='auto';
  addChatMsg('user',text); chatHistory.push({role:'user',content:text});
  saveChatHistory();
  isTyping=true; document.getElementById('send-btn').disabled=true; showTyping();
  fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:getSysProm(),messages:chatHistory})
  }).then(function(res){ return res.json(); }).then(function(data){
    hideTyping();
    if(data.content&&data.content[0]&&data.content[0].text){
      var reply=data.content[0].text;
      var showApply = (chatCtx==='treino'||chatCtx==='dieta'||chatCtx==='dieta-ajustar'||chatCtx==='dieta-analise');
      addChatMsg('assistant',reply,showApply); chatHistory.push({role:'assistant',content:reply});
      saveChatHistory();
    } else { addChatMsg('assistant','Desculpe, tive um problema. Tente novamente.'); }
    isTyping=false; document.getElementById('send-btn').disabled=false;
  }).catch(function(){
    hideTyping(); addChatMsg('assistant','Erro de conexao. Verifique sua internet.');
    isTyping=false; document.getElementById('send-btn').disabled=false;
  });
}

function applyChatPlan(){
  var isT = chatCtx==='treino';
  var isD = chatCtx==='dieta'||chatCtx==='dieta-ajustar'||chatCtx==='dieta-analise';
  if(!isT&&!isD) return;
  var btn = event.currentTarget; btn.disabled=true; btn.textContent='Aplicando...';

  var jsonInstr;
  if(isT){
    jsonInstr = 'Com base no plano de treino que acabamos de discutir, retorne SOMENTE um objeto JSON valido, sem texto adicional, sem markdown, sem explicacao. Formato exato:\n{"weekly":[{"name":"Nome do treino","color":"#1a7a4a","cl":"#e8f5ee","exs":[{"n":"Nome exercicio","s":"4x10","w":0}]},{"rest":true}]}\nRegras: array "weekly" deve ter exatamente 7 itens (Seg a Dom). Use {"rest":true} para dias de descanso. Cores por grupo: verde #1a7a4a/#e8f5ee (peito/triceps), azul #1a5a8a/#e3f0fd (costas/biceps), marrom #993c1d/#faece7 (pernas/gluteos), roxo #5a3ab7/#eeedfb (ombros/core), laranja #854f0b/#faeeda (full body). Campo "w" e peso em kg (0 para exercicios com peso corporal).';
  } else {
    jsonInstr = 'Com base no plano alimentar que acabamos de discutir, retorne SOMENTE um objeto JSON valido, sem texto adicional, sem markdown, sem explicacao. Formato exato:\n{"calories":2000,"meals":[{"id":"cafe","name":"Cafe da manha","time":"07:00","kcal":500,"foods":[{"n":"Alimento","p":"quantidade","k":200}]}]}\nRegras: ids aceitos para refeicoes: cafe, lanche1, almoco, lanche2, jantar, ceia. Campo "k" e as calorias de cada alimento. O campo "calories" e o total diario.';
  }

  var msgs = chatHistory.concat([{role:'user',content:jsonInstr}]);
  fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2500,system:getSysProm(),messages:msgs})
  }).then(function(r){ return r.json(); }).then(function(data){
    if(!data.content||!data.content[0]||!data.content[0].text) throw new Error('sem conteudo');
    var txt = data.content[0].text.trim();
    var jsonStr = txt.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    var parsed = JSON.parse(jsonStr);
    if(!pdOverride[curP]) pdOverride[curP]={};
    if(isT && Array.isArray(parsed.weekly) && parsed.weekly.length===7){
      PD[curP].weekly = parsed.weekly;
      pdOverride[curP].weekly = parsed.weekly;
      save(); showToast('Treino atualizado no app!'); closeChat();
      showScreen('treinos');
    } else if(isD && Array.isArray(parsed.meals) && parsed.meals.length>0){
      // ensure every meal has a unique id
      var idCounts = {};
      parsed.meals = parsed.meals.map(function(m,mi){
        var base = (m.id||'refeicao').toLowerCase().replace(/\s+/g,'');
        idCounts[base] = (idCounts[base]||0) + 1;
        if(idCounts[base]>1) m.id = base+idCounts[base];
        else m.id = base;
        if(!m.foods) m.foods = [];
        m.kcal = m.foods.reduce(function(s,f){ return s+(f.k||0); }, 0);
        return m;
      });
      PD[curP].meals = parsed.meals;
      pdOverride[curP].meals = parsed.meals;
      if(parsed.calories && parsed.calories>0){ PD[curP].calories=parsed.calories; pdOverride[curP].calories=parsed.calories; }
      save(); showToast('Dieta atualizada no app!'); closeChat();
      showScreen('dieta');
    } else {
      throw new Error('formato invalido');
    }
  }).catch(function(e){
    btn.disabled=false; btn.textContent=(isT?'✓ Aplicar treino ao app':'✓ Aplicar plano ao app');
    showToast('Nao foi possivel aplicar. Tente novamente.');
  });
}

function spRender(){
  var m = SP_META[spStep-1];
  var stepsH = '';
  for(var si=0;si<SP_TOTAL;si++){
    stepsH += '<div class="sp-step'+(si<spStep-1?' done':si===spStep-1?' active':'')+'"</div>';
  }
  document.getElementById('sp-steps').innerHTML = stepsH;
  document.getElementById('sp-lbl').innerHTML = 'Etapa <span>'+spStep+' de '+SP_TOTAL+'</span> — '+m.label;
  var backBtn = document.getElementById('sp-back');
  if(spStep === 1){
    backBtn.textContent = '← Menu principal';
    backBtn.style.display = 'block';
    backBtn.onclick = function(){ showScreen('home'); };
  } else {
    backBtn.textContent = '← Voltar';
    backBtn.style.display = 'block';
    backBtn.onclick = spPrev;
  }
  var nxt = document.getElementById('sp-next');
  nxt.textContent = spStep===SP_TOTAL ? 'Gerar meu plano ✨' : 'Continuar →';
  nxt.onclick = spStep===SP_TOTAL ? spGenerate : spNext;

  // Show "Salvar e sair" from step 2 onwards
  var seWrap = document.getElementById('sp-save-exit-wrap');
  var seBtn = document.getElementById('sp-save-exit');
  if(seWrap) seWrap.style.display = spStep > 1 ? 'block' : 'none';
  if(seBtn) seBtn.onclick = function(){
    spSave();
    showScreen('home');
    document.getElementById('bottom-nav').style.display = 'flex';
  };

  var fns = [spS1,spS2,spS3,spS4,spS5,spS6,spS7,spS8];
  document.getElementById('sp-content').innerHTML = '<div class="sp-hdr"><div class="sp-num">'+spStep+' / '+SP_TOTAL+'</div><div class="sp-ttl">'+m.ttl+'</div><div class="sp-sub">'+m.sub+'</div></div>'+fns[spStep-1]();
  window.scrollTo(0,0);

  document.querySelectorAll('.chip[data-sf]').forEach(function(el){
    el.addEventListener('click', function(){ setSF(this.dataset.sf,this.dataset.sv,this); });
  });
  document.querySelectorAll('.chip[data-ma]').forEach(function(el){
    el.addEventListener('click', function(){ toggleMA(this.dataset.ma,this.dataset.mv,this); });
  });
  document.querySelectorAll('.cdot').forEach(function(el,i){
    el.addEventListener('click', function(){ spSetColor(i); });
  });
  var avBtn = document.getElementById('sp-av');
  if(avBtn) avBtn.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  var avBtn2 = document.getElementById('sp-av-wrap');
  if(avBtn2) avBtn2.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  var avUploadBtn = document.getElementById('sp-av-upload-btn');
  if(avUploadBtn) avUploadBtn.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  document.querySelectorAll('[data-angle]').forEach(function(slot){
    slot.addEventListener('click', function(){
      var angle = this.dataset.angle;
      var inp = document.getElementById('file-body-'+angle);
      if(!inp) return;
      inp.onchange = function(e){
        var file = e.target.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev){
          compressBase64(ev.target.result, 600, 0.75, function(c){ P.bodyPhotos[angle]=c; spRender(); });
        };
        reader.readAsDataURL(file);
        inp.onchange = null;
      };
      inp.click();
    });
  });
}

function spLoadFromProfile(){
  var p = PD[curP]; var o = pdOverride[curP]||{};
  if(p.name) P.name = p.name;
  if(p.initials) P.initials = p.initials;
  if(p.avatarBg) P.avatarBg = p.avatarBg;
  if(p.avatarCl) P.avatarCl = p.avatarCl;
  if(p.avatarImg) P.avatarImg = p.avatarImg;
  if(p.age) P.age = String(p.age);
  if(p.weight) P.weight = String(p.weight);
  if(p.height) P.height = String(p.height);
  if(o.gender) P.gender = o.gender; else if(p.gender) P.gender = p.gender;
  if(p.bmr) P.bmr = String(p.bmr); else P.bmr = '';
  if(p.sleep) P.sleepHours = String(p.sleep);
  if(p.sleepTarget) P.sleepTarget = String(p.sleepTarget);
  // Conditions, medications, allergies
  if(o.conditions) P.conditions = o.conditions;
  if(o.medications) P.medications = o.medications||'';
  if(o.allergies) P.allergies = o.allergies||'';
  // Goals — reverse-map from goal string back to values
  if(p.goal){
    var mapped = [];
    GOALS.forEach(function(g){ if(p.goal.indexOf(g.l)>=0) mapped.push(g.v); });
    if(mapped.length) P.goals = mapped;
  }
  // Training level/days from weekly plan length
  if(o.trainingLevel) P.trainingLevel = o.trainingLevel;
  if(o.trainingDays) P.trainingDays = String(o.trainingDays);
}
function setSF(field,val,el){ P[field]=val; el.closest('.chips').querySelectorAll('.chip').forEach(function(c){c.classList.remove('sel');}); el.classList.add('sel'); }
function toggleMA(field,val,el){ var arr=P[field]; var i=arr.indexOf(val); if(i>=0)arr.splice(i,1); else arr.push(val); el.classList.toggle('sel'); }
function spSetColor(i){ P.avatarBg=COLORS[i].bg; P.avatarCl=COLORS[i].cl; document.querySelectorAll('.cdot').forEach(function(d,j){d.classList.toggle('sel',j===i);}); var av=document.getElementById('sp-av'); if(av){av.style.background=P.avatarBg;av.style.color=P.avatarCl;} }
function spUpdateInitials(){ var pts=P.name.trim().split(' '); P.initials=pts.length>=2?(pts[0][0]+pts[pts.length-1][0]).toUpperCase():pts[0]?pts[0].slice(0,2).toUpperCase():''; var av=document.getElementById('sp-av'); if(av&&!P.avatarImg) av.textContent=P.initials||'?'; }
function spCalcIMC(){ if(!P.weight||!P.height) return '--'; return (parseFloat(P.weight)/Math.pow(parseFloat(P.height)/100,2)).toFixed(1); }
function spCalcBMR(){
  if(!P.weight||!P.height||!P.age) return '--';
  var w=parseFloat(P.weight),h=parseFloat(P.height),a=parseInt(P.age),g=P.gender||'M';
  return Math.round(g==='M' ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161);
}

  var iv=document.getElementById('imc-val'); if(iv) iv.textContent=spCalcIMC();
  var bv=document.getElementById('bmr-calc-val'); if(bv){ var b=spCalcBMR(); bv.textContent=b!='--'?b+' kcal/dia':'--'; }

function compressBase64(dataUrl, maxSize, quality, cb){
  var img = new Image();
  img.onload = function(){
    var w = img.width, h = img.height;
    if(w > maxSize || h > maxSize){
      if(w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function applyProfileToPD(idx){
  var p = PD[idx];
  var gender = P.gender||'M';
  var age = parseInt(P.age)||45;
  var weight = parseFloat(P.weight)||80;
  var height = parseInt(P.height)||175;
  var trainDays = parseInt(P.trainingDays)||5;
  var goals = P.goals||[];
  var hasGoal = function(v){ return goals.indexOf(v)>=0; };

  // Mifflin-St Jeor BMR (use measured value if provided)
  var bmrMeasured = parseFloat(P.bmr)||0;
  var bmr = bmrMeasured>0 ? bmrMeasured : (gender==='M'
    ? 10*weight + 6.25*height - 5*age + 5
    : 10*weight + 6.25*height - 5*age - 161);
  p.bmr = bmrMeasured>0 ? bmrMeasured : 0; // store 0 if auto, actual value if measured

  // Activity multiplier by training days
  var act = trainDays>=6?1.725:trainDays>=5?1.55:trainDays>=3?1.375:1.2;

  // Goal calorie adjustment
  var adj = hasGoal('perda_gordura')?0.85:(hasGoal('hipertrofia')||hasGoal('recomposicao'))?1.1:1.0;

  var calories = Math.round(bmr*act*adj/50)*50;

  // Protein: 2g/kg for muscle goals, 1.6g/kg otherwise
  var protFactor = (hasGoal('hipertrofia')||hasGoal('recomposicao')||hasGoal('performance'))?2.0:1.6;
  var protein = Math.round(weight*protFactor/5)*5;
  var fat = Math.round(calories*0.25/9/5)*5;
  var carbs = Math.max(Math.round((calories-protein*4-fat*9)/4/10)*10, 50);

  p.calories = calories; p.protein = protein; p.carbs = carbs; p.fat = fat;
  p.water = Math.round(weight*35/100)*100;

  // Sleep
  var sleepHours = parseFloat(P.sleepHours)||7;
  p.sleep = sleepHours;
  p.sleepTarget = sleepHours < 7 ? 8 : 8;

  // Scores based on profile data
  var scoreFitness = Math.min(95, 45 + trainDays*7 +
    (P.trainingLevel==='avancado'?10:P.trainingLevel==='intermediario'?5:0));
  var scoreSono = sleepHours>=8?90:sleepHours>=7?78:sleepHours>=6?62:45;
  var scoreNutricao = Math.min(95, 65
    + (hasGoal('perda_gordura')||hasGoal('hipertrofia')||hasGoal('recomposicao')?10:0)
    + (hasGoal('digestao')||hasGoal('longevidade')?5:0));
  var imc = weight/Math.pow(height/100,2);
  var scoreSaude = Math.min(95, 60
    + (imc>=18.5&&imc<25?15:imc<18.5||imc>=30?0:8)
    + (age<40?10:age<50?6:3)
    + (sleepHours>=7?5:0));
  p.scores = {
    Saude: Math.round(scoreSaude),
    Fitness: Math.round(scoreFitness),
    Sono: Math.round(scoreSono),
    Nutricao: Math.round(scoreNutricao)
  };

  // Insight summary
  var goalLabels = goals.slice(0,3).map(function(g){
    var f=GOALS.find(function(x){return x.v===g;}); return f?f.l.toLowerCase():g;
  }).join(', ');
  var imcClass = imc<18.5?'abaixo do peso':imc<25?'peso ideal':imc<30?'sobrepeso':'obesidade grau I';
  p.insight = 'Perfil atualizado: '+age+' anos, '+weight+'kg, IMC '+imc.toFixed(1)+' ('+imcClass+'). '
    +'Treinos '+trainDays+'x/semana, nivel '+P.trainingLevel+'. Sono: '+sleepHours+'h'
    +(sleepHours<7?' — aumentar para 8h e prioridade':'')+'.'
    +' Foco: '+goalLabels+'. Meta: '+calories+'kcal/dia, '+protein+'g proteina.';

  // Adjust weekly: first trainDays are active, rest are rest days
  var activePlans = p.weekly.filter(function(d){ return !d.rest; });
  var newWeekly = [];
  var ai = 0;
  for(var i=0; i<7; i++){
    if(i<trainDays){ newWeekly.push(activePlans[ai%activePlans.length]); ai++; }
    else { newWeekly.push({rest:true}); }
  }
  p.weekly = newWeekly;

  // Scale meal calories proportionally to new total
  var mealTotal = p.meals.reduce(function(s,m){ return s+(m.kcal||0); },0);
  if(mealTotal>0){
    var ratio = calories/mealTotal;
    p.meals.forEach(function(m){
      m.kcal = Math.round(m.kcal*ratio/10)*10;
      if(m.foods) m.foods.forEach(function(f){ f.k = Math.round(f.k*ratio/5)*5; });
    });
  }

  // Persist override
  if(!pdOverride[idx]) pdOverride[idx]={};
  pdOverride[idx].calories=p.calories; pdOverride[idx].protein=p.protein;
  pdOverride[idx].carbs=p.carbs; pdOverride[idx].fat=p.fat;
  pdOverride[idx].water=p.water; pdOverride[idx].weekly=p.weekly;
  pdOverride[idx].meals=p.meals; pdOverride[idx].sleep=p.sleep;
  pdOverride[idx].sleepTarget=p.sleepTarget; pdOverride[idx].scores=p.scores;
  pdOverride[idx].insight=p.insight;
  if(p.bmr) pdOverride[idx].bmr=p.bmr;
}

function spSave(){
  if(!pdOverride[curP]) pdOverride[curP]={};
  if(P.name){ PD[curP].name=P.name; pdOverride[curP].name=P.name; }
  if(P.initials){ PD[curP].initials=P.initials; pdOverride[curP].initials=P.initials; }
  PD[curP].avatarBg=P.avatarBg; PD[curP].avatarCl=P.avatarCl;
  if(P.avatarImg){
    PD[curP].avatarImg=P.avatarImg;
    // Cloud-safe compressed avatar for Firestore
    compressBase64(P.avatarImg, 120, 0.7, function(cloudImg){
      if(!pdOverride[curP]) pdOverride[curP]={};
      pdOverride[curP].avatarImg = cloudImg;
    });
  }
  if(P.age){ PD[curP].age=parseInt(P.age); pdOverride[curP].age=PD[curP].age; }
  if(P.weight){ PD[curP].weight=parseFloat(P.weight); pdOverride[curP].weight=PD[curP].weight; }
  if(P.height){ PD[curP].height=parseInt(P.height); pdOverride[curP].height=PD[curP].height; }
  if(P.gender){ pdOverride[curP].gender=P.gender; }
  var bmrVal = parseFloat(P.bmr)||0;
  if(bmrVal>0){ PD[curP].bmr=bmrVal; pdOverride[curP].bmr=bmrVal; } else { PD[curP].bmr=0; pdOverride[curP].bmr=0; }
  if(P.goals.length){
    PD[curP].goal=P.goals.map(function(g){ var f=GOALS.find(function(x){return x.v===g;}); return f?f.l:g; }).join(' + ');
    pdOverride[curP].goal=PD[curP].goal;
  }
  if(P.trainingLevel) pdOverride[curP].trainingLevel=P.trainingLevel;
  if(P.trainingDays) pdOverride[curP].trainingDays=P.trainingDays;
  if(P.medications!=null) pdOverride[curP].medications=P.medications;
  if(P.conditions) pdOverride[curP].conditions=P.conditions;
  if(P.allergies!=null) pdOverride[curP].allergies=P.allergies;
  // Save body photos from setup to progressPhotos
  var today = new Date().toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
  var photoMap = [{key:'frente',idx:0,angle:'Frente'},{key:'lado',idx:1,angle:'Lado'},{key:'costas',idx:2,angle:'Costas'}];
  photoMap.forEach(function(pm){
    if(P.bodyPhotos[pm.key]){
      PD[curP].progressPhotos[pm.idx].img = P.bodyPhotos[pm.key];
      PD[curP].progressPhotos[pm.idx].date = today;
      // Cloud-safe compressed progress photo
      (function(idx,angle,src,dt){
        compressBase64(src, 200, 0.7, function(cloudImg){
          if(!pdOverride[curP]) pdOverride[curP]={};
          if(!pdOverride[curP].progressPhotos) pdOverride[curP].progressPhotos = PD[curP].progressPhotos.map(function(ph){ return {angle:ph.angle,date:ph.date,img:''}; });
          pdOverride[curP].progressPhotos[idx] = {angle:angle, date:dt, img:cloudImg};
        });
      })(pm.idx, pm.angle, P.bodyPhotos[pm.key], today);
    }
  });

  applyProfileToPD(curP);
  snapshotHistory(curP);
  // Save initial exam inputs as first history entry
  var examVals = {}; var hasExam = false;
  Object.keys(P.examInputs).forEach(function(k){ if(P.examInputs[k]){ examVals[k]=parseFloat(P.examInputs[k]); hasExam=true; } });
  if(hasExam){
    if(!pdOverride[curP].examHistory) pdOverride[curP].examHistory=[];
    var today2 = new Date();
    pdOverride[curP].examHistory.push({date:today2.toISOString().slice(0,10), dateLabel:today2.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}), values:examVals});
  }
  profileComplete=true;
  save(); showToast('Perfil salvo! Treino e dieta atualizados ✓');
  showScreen('home');
}

  swTouchX = e.touches[0].clientX;
  swTouchY = e.touches[0].clientY;
  swLocked = false;
}, {passive:true});

document.addEventListener('touchend', function(e){
  if(swLocked) return;
  var dx = e.changedTouches[0].clientX - swTouchX;
  var dy = e.changedTouches[0].clientY - swTouchY;

  // Must be clearly horizontal (dx dominant) and long enough
  if(Math.abs(dx) < 50) return;
  if(Math.abs(dy) > Math.abs(dx) * 0.7) return;

  // Skip if modals open
  if(document.getElementById('chat-back').classList.contains('open')) return;
  if(document.getElementById('wmodal-back').classList.contains('open')) return;
  if(curScreen === 'setup' || curScreen === 'login') return;

  // Skip if touch started inside a horizontal scrollable element
  var el = e.target;
  while(el && el.tagName !== 'BODY'){
    if(el.scrollWidth > el.clientWidth + 5) return;
    el = el.parentElement;
  }

  var idx = SCREEN_ORDER.indexOf(curScreen);
  if(idx === -1) return;
  swLocked = true;
  if(dx < 0 && idx < SCREEN_ORDER.length - 1){
    showScreen(SCREEN_ORDER[idx + 1]);
  } else if(dx > 0 && idx > 0){
    showScreen(SCREEN_ORDER[idx - 1]);
  }
}, {passive:true});

    'auth/network-request-failed': 'Erro de conexao. Verifique sua internet.',

function doAuth(){
  var email = document.getElementById('auth-email').value.trim();
  var pass = document.getElementById('auth-pass').value;
  clearAuthMsgs();

  if(!email || !pass){ showAuthError('Preencha email e senha.'); return; }
  if(pass.length < 6){ showAuthError('Senha deve ter pelo menos 6 caracteres.'); return; }

  var btn = document.getElementById('auth-btn');
  btn.textContent = authMode === 'login' ? 'Entrando...' : 'Criando conta...';
  btn.disabled = true;

  if(!fbAuth){
    // Firebase not configured - go straight to app (dev mode)
    showToast('Modo desenvolvimento - Firebase nao configurado');
    showScreen('home');
    btn.disabled = false;
    return;
  }

  if(authMode === 'login'){
    fbAuth.signInWithEmailAndPassword(email, pass)
      .then(function(cred){
        currentUser = cred.user;
        btn.textContent = 'Entrar'; btn.disabled = false;
        var nome = (cred.user.displayName || cred.user.email).split(' ')[0];
        showToast('Bem-vindo, ' + nome + '! 👋');
        loadUserData(cred.user.uid, function(){ showScreen('home'); });
      })
      .catch(function(err){
        btn.textContent = 'Entrar'; btn.disabled = false;
        showAuthError(getAuthErrorMsg(err.code));
      });
  } else {
    var name = document.getElementById('auth-name').value.trim();
    if(!name){ showAuthError('Digite seu nome.'); btn.textContent = 'Criar conta'; btn.disabled = false; return; }
    fbAuth.createUserWithEmailAndPassword(email, pass)
      .then(function(cred){
        currentUser = cred.user;
        return cred.user.updateProfile({displayName: name});
      })
      .then(function(){
        btn.textContent = 'Criar conta'; btn.disabled = false;
        spStep = 1;
        showScreen('setup');
        document.getElementById('bottom-nav').style.display = 'none';
        spRender();
      })
      .catch(function(err){
        btn.textContent = 'Criar conta'; btn.disabled = false;
        showAuthError(getAuthErrorMsg(err.code));
      });
  }
}

function forgotPass(){
  var email = document.getElementById('auth-email').value.trim();
  if(!email){ showAuthError('Digite seu email primeiro.'); return; }
  if(!fbAuth){ showAuthSuccess('Email enviado! (modo dev)'); return; }
  fbAuth.sendPasswordResetEmail(email)
    .then(function(){ showAuthSuccess('Email de recuperacao enviado para ' + email); })
    .catch(function(err){ showAuthError(getAuthErrorMsg(err.code)); });
}

// ── FIRESTORE SYNC ────────────────────────────────────────────
function loadUserData(uid, callback){
  if(!fbDb){ applyResetMealsFlag(); if(callback) callback(); return; }
  var done = false;
  // Timeout: if Firestore takes more than 5s, proceed anyway
  var timer = setTimeout(function(){
    if(!done){ done = true; applyResetMealsFlag(); if(callback) callback(); }
  }, 5000);
  fbDb.collection('users').doc(uid).get()
    .then(function(doc){
      if(done) return;
      done = true; clearTimeout(timer);
      if(doc.exists){
        var data = doc.data();
        if(data.appState){
          try{
            var s = data.appState;
            curP = s.curP||0; curDay = s.curDay||curDay;
            function mergeObj(local, remote){
              var r = remote||{}; var out = Object.assign({}, r);
              Object.keys(local||{}).forEach(function(k){ if(local[k]===true) out[k]=true; else if(!(k in out)) out[k]=local[k]; });
              return out;
            }
            // only merge daily tracking if Firebase data is from TODAY
            // if Firebase is from a previous day, daily state was already reset — don't restore old data
            var firebaseIsToday = (s.lastSavedDate === todayStr());
            if(firebaseIsToday){
              mealDone = mergeObj(mealDone, s.mealDone);
              foodDone = mergeObj(foodDone, s.foodDone);
              suppDone = mergeObj(suppDone, s.suppDone);
              habitDone = mergeObj(habitDone, s.habitDone);
              waterGlasses = mergeObj(waterGlasses, s.waterGlasses);
              exChecked = mergeObj(exChecked, s.exChecked);
              exSets = mergeObj(exSets, s.exSets);
            } else {
              // Firebase has old data — keep local (already reset) state, don't restore yesterday
              exWeights = Object.assign({}, s.exWeights||{}, exWeights);
              cardioSel = Object.assign({}, s.cardioSel||{}, cardioSel);
              walkParams = Object.assign({}, s.walkParams||{}, walkParams);
            }
            if(firebaseIsToday){
              exWeights = Object.assign({}, s.exWeights||{}, exWeights);
              cardioSel = Object.assign({}, s.cardioSel||{}, cardioSel);
              cardioChecked = mergeObj(cardioChecked, s.cardioChecked);
              walkParams = Object.assign({}, s.walkParams||{}, walkParams);
              sleepData = mergeObj(sleepData, s.sleepData);
            }
            expandedExam = s.expandedExam||{};
            profileComplete = s.profileComplete||false;
            if(s.pdOverride){
              pdOverride = s.pdOverride;
              Object.keys(pdOverride).forEach(function(idx){
                var i = parseInt(idx); if(!PD[i]) return;
                var o = pdOverride[idx];
                if(o.name) PD[i].name = o.name;
                if(o.initials) PD[i].initials = o.initials;
                if(o.age) PD[i].age = o.age;
                if(o.weight) PD[i].weight = o.weight;
                if(o.height) PD[i].height = o.height;
                if(o.goal) PD[i].goal = o.goal;
                // only apply calories from Firebase if local user hasn't locked it manually
                var localLocked = pdOverride[i] && pdOverride[i].caloriesLocked;
                if(o.calories!=null && !localLocked) PD[i].calories = o.calories;
                if(o.caloriesLocked) { if(!pdOverride[i]) pdOverride[i]={}; pdOverride[i].caloriesLocked = o.caloriesLocked; }
                if(o.protein!=null) PD[i].protein = o.protein;
                if(o.carbs!=null) PD[i].carbs = o.carbs;
                if(o.fat!=null) PD[i].fat = o.fat;
                if(o.water!=null) PD[i].water = o.water;
                if(o.weekly) PD[i].weekly = o.weekly;
                if(o.meals && o.meals.length>0){
                  var mIds = o.meals.map(function(m){ return (m.id||'').toLowerCase(); });
                  var allSame = mIds.every(function(v){ return v===mIds[0]; });
                  if(!allSame) PD[i].meals = o.meals; // only apply if not corrupt
                }
                if(o.supps && o.supps.length>0) PD[i].supps = o.supps;
                if(o.sleep!=null) PD[i].sleep = o.sleep;
                if(o.sleepTarget!=null) PD[i].sleepTarget = o.sleepTarget;
                if(o.scores) PD[i].scores = o.scores;
                if(o.insight) PD[i].insight = o.insight;
                if(o.avatarImg) PD[i].avatarImg = o.avatarImg;
                if(o.progressPhotos && o.progressPhotos.length) PD[i].progressPhotos = o.progressPhotos;
                if(o.bmr!=null) PD[i].bmr = o.bmr;
                if(o.gender) PD[i].gender = o.gender;
              });
            }
            if(s.historyData){
              // merge history: keep all entries from both local and Firebase, deduplicate by date
              var remoteHist = Array.isArray(s.historyData)?{[curP]:s.historyData}:s.historyData;
              Object.keys(remoteHist).forEach(function(pi){
                var ri = parseInt(pi);
                if(!historyData[ri]) historyData[ri] = [];
                var merged = historyData[ri].slice();
                (remoteHist[pi]||[]).forEach(function(re){
                  if(!merged.find(function(le){ return le.date===re.date; })) merged.push(re);
                });
                historyData[ri] = merged.sort(function(a,b){ return a.date<b.date?-1:1; });
              });
            }
            // merge chat histories
            if(s.chatHistories){
              Object.keys(s.chatHistories).forEach(function(k){
                if(!chatHistories[k] || !chatHistories[k].length) chatHistories[k] = s.chatHistories[k];
              });
            }
            // day-change detection for Firestore data
            if(s.lastSavedDate && s.lastSavedDate !== todayStr()) handleDayChange(s.lastSavedDate);
          }catch(e){}
        }
      }
      applyResetMealsFlag();
      save(); // immediately persist merged state back to Firebase
      if(callback) callback();
    })
    .catch(function(){ if(!done){ done=true; clearTimeout(timer); applyResetMealsFlag(); if(callback) callback(); } });
}

function setSyncStatus(status){
  var el = document.getElementById('sync-status');
  if(!el) return;
  if(status==='saving'){ el.textContent='⏳ salvando...'; el.style.color='var(--muted)'; }
  else if(status==='ok'){ el.textContent='✓ salvo'; el.style.color='var(--green)'; }
  else if(status==='error'){ el.textContent='⚠ erro ao salvar'; el.style.color='var(--coral)'; }
  else if(status==='local'){ el.textContent='💾 local'; el.style.color='var(--muted)'; }
}

function saveToCloud(){
  if(!fbAuth || !fbAuth.currentUser || !fbDb){ setSyncStatus('local'); return; }
  setSyncStatus('saving');
  var uid = fbAuth.currentUser.uid;
  // Strip image data from pdOverride before saving (too large for Firestore)
  var pdOverrideSafe = {};
  Object.keys(pdOverride).forEach(function(idx){
    var o = pdOverride[idx];
    pdOverrideSafe[idx] = {
      name:o.name, initials:o.initials, age:o.age, weight:o.weight, height:o.height,
      goal:o.goal, calories:o.calories, protein:o.protein, carbs:o.carbs, fat:o.fat,
      water:o.water, weekly:o.weekly, meals:o.meals||null, supps:o.supps||null,
      sleep:o.sleep, sleepTarget:o.sleepTarget, scores:o.scores, insight:o.insight,
      caloriesLocked: o.caloriesLocked||false,
      examHistory:o.examHistory,
      avatarImg: o.avatarImg||'',
      progressPhotos: o.progressPhotos||[],
      bmr: o.bmr||0,
      gender: o.gender||'M',
      trainingLevel: o.trainingLevel||'',
      trainingDays: o.trainingDays||'',
      medications: o.medications||'',
      conditions: o.conditions||[],
      allergies: o.allergies||''
    };
  });
  var appState = {
    curP:curP, curDay:curDay, mealDone:mealDone, foodDone:foodDone, suppDone:suppDone,
    habitDone:habitDone, exChecked:exChecked, exSets:exSets, exWeights:exWeights,
    cardioSel:cardioSel, cardioChecked:cardioChecked, walkParams:walkParams,
    waterGlasses:waterGlasses, sleepData:sleepData, expandedExam:expandedExam,
    profileComplete:profileComplete, pdOverride:pdOverrideSafe,
    historyData:historyData, chatHistories:chatHistories,
    lastSavedDate:todayStr(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  fbDb.collection('users').doc(uid).set({appState:appState}, {merge:true})
    .then(function(){ setSyncStatus('ok'); })
    .catch(function(e){ setSyncStatus('error'); console.log('Firestore save error:', e); });
}

var swReg = null;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(function(reg){ swReg = reg; });
}

function requestNotifPermission(onGranted){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){ if(onGranted) onGranted(); return; }
  if(Notification.permission==='denied') return;
  Notification.requestPermission().then(function(p){ if(p==='granted' && onGranted) onGranted(); });
}

function sendNotif(title, body, tag){
  if(Notification.permission!=='granted') return;
  // try SW first, fallback to direct Notification
  if(swReg && swReg.active){
    swReg.active.postMessage({type:'SHOW_NOTIFICATION', title:title, body:body, tag:tag||'mh'});
  } else if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({type:'SHOW_NOTIFICATION', title:title, body:body, tag:tag||'mh'});
  } else {
    try{ new Notification(title, {body:body, icon:'/icon-192.png'}); }catch(e){}
  }
}

var notifTimers = [];
function scheduleNotifications(){
  notifTimers.forEach(clearTimeout); notifTimers=[];
  if(Notification.permission!=='granted') return;
  var p = PD[curP];
  var now = new Date();
  function msUntil(h,m){ var t=new Date(); t.setHours(h,m,0,0); var d=t-now; return d>0?d:null; }
  var totalGlasses = Math.round(p.water/250);
  var waterMsgs = [
    'Beba um copo agora! Meta: '+totalGlasses+' copos no dia 💧',
    'Hidratação em dia? Tome um copo de água agora 💧',
    'Seu corpo agradece! Um copo de água 💧',
    'Não se esqueça da água — '+(Math.round(totalGlasses/2))+' copos até agora? 💧',
    'Metade do dia passou — está hidratado? 💧',
    'Mais um copo de água! Faltam poucas horas 💧',
    'Último lembrete de água do dia — beba agora! 💧',
  ];
  var reminders = [
    {h:8,  m:0,  title:'🌅 Café da manhã', body:'Hora do café da manhã! Registre o que comeu.'},
    {h:9,  m:0,  title:'💧 Água', body:waterMsgs[0], tag:'water'},
    {h:10, m:30, title:'🥜 Lanche da manhã', body:'Lanche da manhã — não esqueça de registrar.'},
    {h:11, m:30, title:'💧 Água', body:waterMsgs[1], tag:'water'},
    {h:13, m:0,  title:'🍽️ Almoço', body:'Hora do almoço! Marque suas refeições.'},
    {h:14, m:30, title:'💧 Água', body:waterMsgs[2], tag:'water'},
    {h:16, m:0,  title:'🍎 Lanche da tarde', body:'Lanche da tarde — mantenha o plano!'},
    {h:17, m:30, title:'💧 Água', body:waterMsgs[3], tag:'water'},
    {h:19, m:0,  title:'💧 Água', body:waterMsgs[4], tag:'water'},
    {h:20, m:0,  title:'🍴 Jantar', body:'Hora do jantar. Registre o que comeu.'},
    {h:21, m:0,  title:'💧 Água', body:waterMsgs[5], tag:'water'},
    {h:22, m:0,  title:'😴 Hora de dormir', body:'Meta de sono: '+p.sleepTarget+'h. Boa noite!'},
  ];
  var scheduled = [];
  reminders.forEach(function(r){
    var ms = msUntil(r.h, r.m);
    if(ms){
      (function(rem){ notifTimers.push(setTimeout(function(){ sendNotif(rem.title, rem.body, rem.tag||'meal-'+rem.h); }, ms)); })(r);
      scheduled.push(r.h+':'+(r.m<10?'0':'')+r.m+' '+r.title);
    }
  });
  return scheduled;
}

// ask for permission once, then schedule
setTimeout(function(){
  requestNotifPermission(scheduleNotifications);
}, 3000);

// reschedule daily
setInterval(function(){
  var h = new Date().getHours(), m = new Date().getMinutes();
  if(h===0 && m===0) scheduleNotifications();
}, 60000);
