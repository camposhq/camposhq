<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyHealth">
<title>MyHealth</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a7a4a">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a7a4a;--green-light:#e8f5ee;--green-deep:#0f4f30;
  --orange:#c4621a;--orange-light:#fdf0e8;
  --blue:#1a5a8a;--blue-light:#e3f0fd;
  --indigo:#3730a3;--indigo-light:#eef2ff;
  --coral:#c0392b;--coral-light:#fdecea;
  --purple:#5a3ab7;--purple-light:#eeedfb;
  --amber:#c47a1a;--amber-light:#fdf3e3;
  --surface:#f7f8f6;--card:#fff;--text:#111310;--muted:#6b7068;
  --border:rgba(0,0,0,0.07);--radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html.dark{
  --surface:#111312;--card:#1c1e1b;--text:#eceeed;--muted:#8a9088;
  --border:rgba(255,255,255,0.08);
  --green-light:#0d2a1a;--orange-light:#2a1a0d;--blue-light:#0d1e2a;
  --indigo-light:#16153a;--coral-light:#2a0d0d;--purple-light:#1a1330;
  --amber-light:#2a1e0d;
}
html.dark body{ background:var(--surface); }
html.dark .bottom-nav{ background:rgba(17,19,18,.96); }
html.dark .topbar{ background:var(--surface); }
html.dark input,html.dark textarea{ background:#222;color:var(--text);border-color:var(--border); }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100dvh}
.screen{display:none;min-height:100dvh;padding-bottom:calc(72px + var(--safe-bottom));padding-top:var(--safe-top);overflow-y:auto}
.screen.active{display:block}
.topbar{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10}
.topbar h1{font-family:'Fraunces',serif;font-size:22px;font-weight:400;letter-spacing:-.3px}
.topbar p{font-size:13px;color:var(--muted);margin-top:1px}
.ai-badge{background:var(--green);color:#fff;font-size:11px;font-weight:500;padding:5px 10px;border-radius:99px;font-family:'DM Mono',monospace;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(247,248,246,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));z-index:30}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;color:var(--muted);font-weight:500}
.nav-item.active .nav-label{font-weight:600;color:var(--green)}
.profiles{display:flex;gap:10px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.profiles::-webkit-scrollbar{display:none}
.profile-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;flex-shrink:0}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border:2.5px solid transparent;transition:border-color .2s;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.active{border-color:var(--green)}
.pname{font-size:11px;color:var(--muted)}
.section{padding:0 20px 14px}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.card-sm{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.metric-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px}
.metric-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.metric-unit{font-size:13px;color:var(--muted);font-weight:400}
.metric-label{font-size:12px;color:var(--muted);margin-top:4px}
.metric-trend{font-size:11px;margin-top:3px}
.trend-up{color:var(--green)}
.trend-down{color:var(--coral)}
.score-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}
.score-lbl{font-size:14px;flex:1}
.score-bw{flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden;margin:0 12px}
.score-bf{height:100%;border-radius:3px}
.score-num{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;min-width:26px;text-align:right}
.cmp-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.cmp-card:last-child{margin-bottom:0}
.cmp-bar-row{display:flex;align-items:center;gap:8px;margin-top:5px}
.cmp-bar-lbl{font-size:10px;color:var(--muted);width:28px;flex-shrink:0;font-weight:500}
.cmp-bar-track{flex:1;height:6px;background:#eee;border-radius:3px;position:relative}
.cmp-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.cmp-bar-num{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;width:24px;text-align:right;flex-shrink:0}
.cmp-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0}
.cmp-badge.good{background:#e8f5ee;color:#1a7a4a}
.cmp-badge.bad{background:#faecea;color:#c0392b}
.cmp-badge.ok{background:#f0f0ed;color:#888}
.cmp-badge.top{background:#fdf3dc;color:#b45309}
.ai-card{border-radius:var(--radius);padding:14px;margin-bottom:0}
.ai-card.green{background:var(--green-light);border:1px solid rgba(26,122,74,.12)}
.ai-card.indigo{background:var(--indigo-light);border:1px solid rgba(55,48,163,.12)}
.ai-card.coral{background:var(--coral-light);border:1px solid rgba(192,57,43,.12)}
.ai-card.orange{background:var(--orange-light);border:1px solid rgba(196,98,26,.12)}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.ai-dot.green{background:var(--green)}
.ai-dot.indigo{background:var(--indigo)}
.ai-dot.coral{background:var(--coral)}
.ai-dot.orange{background:var(--orange)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.ai-ttl.green{color:var(--green)}
.ai-ttl.indigo{color:var(--indigo)}
.ai-ttl.coral{color:var(--coral)}
.ai-ttl.orange{color:var(--orange)}
.ai-txt{font-size:13px;line-height:1.6}
.ai-txt.green{color:#1f4a30}
.ai-txt.indigo{color:#1e1b4b}
.ai-txt.coral{color:#4a1a14}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:left;cursor:pointer;transition:all .15s}
.act-btn:active{transform:scale(.97)}
.act-icon{font-size:18px;margin-bottom:6px;display:block}
.act-lbl{font-size:13px;font-weight:500;color:var(--text);display:block}
.act-sub{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.btn-full{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn-full:active{opacity:.85}
.btn-outline{width:100%;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
.prog-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:13px;font-weight:500}
.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green)}
.prog-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px}
.stat-val{font-size:19px;font-weight:600;font-family:'DM Mono',monospace}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap}
.week-strip{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.week-strip::-webkit-scrollbar{display:none}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 13px;border-radius:var(--radius-sm);border:1.5px solid transparent;background:var(--card);cursor:pointer;flex-shrink:0;transition:all .15s}
.day-btn.active{background:var(--green);border-color:var(--green)}
.day-btn.active .dlabel,.day-btn.active .dnum{color:#fff}
.day-btn.rest{background:var(--surface);border-color:var(--border)}
.dlabel{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.dnum{font-size:16px;font-weight:600;color:var(--text)}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--green)}
.day-btn.active .ddot{background:rgba(255,255,255,.5)}
.day-btn.rest .ddot{background:var(--border)}
.block-hdr{border-radius:var(--radius) var(--radius) 0 0;padding:14px 16px 12px;color:#fff}
.block-type{font-size:10px;font-weight:600;opacity:.75;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:3px}
.block-title{font-size:18px;font-weight:400;margin-bottom:10px;font-family:'Fraunces',serif}
.block-meta{display:flex;gap:16px}
.bmv{font-size:15px;font-weight:600}
.bml{font-size:11px;opacity:.7;margin-top:1px}
.ex-block{background:var(--card);border:1px solid var(--border);overflow:hidden;border-radius:0 0 var(--radius) var(--radius);border-top:none}
.ex-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.ex-row:last-child{border-bottom:none}
.ex-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500}
.ex-name.done{text-decoration:line-through;opacity:.4}
.ex-sets{font-size:11px;color:var(--muted);margin-top:2px}
.ex-wbtn{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text);min-width:48px;text-align:center;transition:all .15s;flex-shrink:0}
.ex-wbtn:active{background:var(--green-light);border-color:var(--green)}
.ex-wbtn.nw{color:var(--muted);font-weight:400;font-size:11px}
.ex-vid{width:26px;height:26px;border-radius:7px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .15s}
.ex-vid:active{background:#ffe8e8}
.ex-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;cursor:pointer}
.ex-check.done{background:var(--green);border-color:var(--green)}
.ex-set-dot{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0}
.ex-set-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.ex-set-dot:active{transform:scale(.9)}
.rt-preset{flex:1;padding:13px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);cursor:pointer;transition:all .15s}
.rt-preset:active,.rt-preset.sel{background:var(--green-light);border-color:var(--green);color:var(--green)}
.ex-check.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block}
.meal-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.meal-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer}
.meal-hdr-l{display:flex;align-items:center;gap:10px}
.meal-time{background:var(--green-light);color:var(--green-deep);font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:'DM Mono',monospace}
.meal-name{font-size:14px;font-weight:500}
.meal-kcal{font-size:12px;color:var(--muted);margin-top:1px}
.food-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px}
.food-item:last-child{border-bottom:none}
.food-name{font-size:13px}
.food-portion{font-size:12px;color:var(--muted);margin-top:1px}
.food-kcal{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--muted)}
.food-swap{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer;color:var(--muted);flex-shrink:0;transition:all .15s}
.food-swap:active{background:var(--surface);color:var(--text)}
.mcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;transition:all .15s;cursor:pointer}
.mcheck.done{background:var(--green);border-color:var(--green)}
.supp-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.supp-item:last-child{border-bottom:none}
.supp-icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.supp-info{flex:1}
.supp-name{font-size:14px;font-weight:500}
.supp-detail{font-size:12px;color:var(--muted);margin-top:1px}
.supp-time{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;font-family:'DM Mono',monospace;flex-shrink:0}
.scheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;transition:all .15s}
.scheck.done{background:var(--green);border-color:var(--green)}
.macro-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:18px}
.ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-kcal{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.ring-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.macros-detail{flex:1;display:flex;flex-direction:column;gap:7px}
.macro-row{display:flex;align-items:center;gap:7px}
.macro-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.macro-nm{font-size:12px;color:var(--muted);flex:1}
.macro-bw{flex:2;height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
.macro-bf{height:100%;border-radius:2px}
.macro-vl{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;min-width:36px;text-align:right}
.water-card{background:var(--blue-light);border-radius:var(--radius);border:1px solid rgba(26,90,138,.12);padding:14px}
.water-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.water-title{font-size:14px;font-weight:500;color:var(--blue)}
.water-val{font-size:18px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace}
.water-glasses{display:flex;gap:6px;flex-wrap:wrap}
.glass{width:34px;height:34px;border-radius:8px;border:1.5px solid rgba(26,90,138,.2);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.glass.filled{background:var(--blue);border-color:var(--blue);color:white}
.score-hero{background:var(--indigo);border-radius:var(--radius);padding:22px 20px;color:#fff;text-align:center;margin-bottom:10px}
.hero-score{font-family:'Fraunces',serif;font-size:68px;font-weight:300;line-height:1}
.hero-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:99px;padding:4px 14px;font-size:13px;font-weight:500;margin:8px 0 14px}
.hero-meta{display:flex;justify-content:center;gap:24px}
.hm-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.hm-lbl{font-size:11px;opacity:.65;margin-top:2px}
.habit-item{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px}
.habit-icon-lbl{font-size:22px;flex-shrink:0}
.habit-info{flex:1}
.habit-name{font-size:14px;font-weight:500}
.habit-name.done{text-decoration:line-through;opacity:.45}
.habit-tip{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.hcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.hcheck.done{background:var(--indigo);border-color:var(--indigo)}
.hcheck.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block}
.exam-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.exam-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.exam-hdr-l{display:flex;align-items:center;gap:10px}
.exam-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exam-name{font-size:14px;font-weight:500}
.exam-date{font-size:12px;color:var(--muted);margin-top:1px}
.s-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;font-family:'DM Mono',monospace;flex-shrink:0}
.s-ok{background:var(--green-light);color:var(--green)}
.s-alert{background:var(--amber-light);color:var(--amber)}
.s-danger{background:var(--coral-light);color:var(--coral)}
.marker-item{padding:10px 16px;border-bottom:1px solid var(--border)}
.marker-item:last-child{border-bottom:none}
.marker-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.marker-name{font-size:13px;font-weight:500}
.marker-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.marker-ref{font-size:11px;color:var(--muted)}
.marker-bw{height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.marker-bf{height:100%;border-radius:3px}
.upload-area{border:2px dashed rgba(192,57,43,.25);border-radius:var(--radius);padding:24px 20px;text-align:center;background:var(--coral-light);cursor:pointer}
.upload-area:active{border-color:var(--coral)}
.photo-angles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}

.dash-hero{background:var(--green);border-radius:var(--radius);padding:20px;margin:0 20px 14px;color:white}
.dash-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dash-greeting{font-family:'Fraunces',serif;font-size:22px;font-weight:300}
.dash-score-row{display:flex;background:rgba(0,0,0,.15);border-radius:var(--radius-sm);overflow:hidden}
.dsi{flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.dsi:last-child{border-right:none}
.dsi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.dsi-lbl{font-size:10px;opacity:.7;margin-top:3px}
.wmodal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.wmodal-back.open{opacity:1;pointer-events:all}
.wmodal{background:var(--card);border-radius:var(--radius);padding:24px;width:280px;text-align:center}
.wmodal-title{font-size:16px;font-weight:500;margin-bottom:4px}
.wmodal-ex{font-size:13px;color:var(--muted);margin-bottom:16px}
.wmodal-input{width:100%;padding:14px;border:2px solid var(--green);border-radius:var(--radius-sm);font-size:28px;font-weight:600;font-family:'DM Mono',monospace;text-align:center;outline:none;color:var(--text);background:var(--surface);margin-bottom:6px}
.wmodal-unit{font-size:13px;color:var(--muted);margin-bottom:16px}
.wmodal-btns{display:flex;gap:10px}
.wmodal-cancel{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text)}
.wmodal-save{flex:2;padding:12px;background:var(--green);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;color:#fff}
.chat-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-back.open{opacity:1;pointer-events:all}
.chat-modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:88dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom)}
.chat-back.open .chat-modal{transform:translateY(0)}
.chat-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.chat-hdr{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-ttl{font-size:16px;font-weight:500}
.chat-sub{font-size:12px;color:var(--muted);margin-top:2px}
.chat-x{width:30px;height:30px;border-radius:50%;background:var(--surface);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-bbl{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.user .msg-bbl{background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bbl{background:var(--surface);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
.msg.assistant .msg-time{text-align:left}
.apply-plan-btn{display:block;width:100%;margin-top:8px;padding:10px 14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:opacity .15s}
.apply-plan-btn:disabled{opacity:.6;cursor:default}
.typing-wrap{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--surface);border-radius:16px;border-bottom-left-radius:4px;border:1px solid var(--border);width:fit-content}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.qps{display:flex;gap:8px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;flex-shrink:0}
.qps::-webkit-scrollbar{display:none}
.qp{flex-shrink:0;padding:7px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid rgba(26,122,74,.15);background:var(--green-light);color:var(--green-deep)}
.qp:active{background:var(--green);color:#fff}
.chat-inp-wrap{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-inp{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;background:var(--surface);color:var(--text);max-height:100px;line-height:1.4}
.chat-inp:focus{border-color:var(--green)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{opacity:.8}
.send-btn svg{width:18px;height:18px;fill:white}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.setup-wrap{min-height:100dvh;padding:var(--safe-top) 0 calc(80px + var(--safe-bottom))}
.sp-prog{position:sticky;top:var(--safe-top);background:var(--surface);padding:12px 20px 0;z-index:10}
.sp-steps{display:flex;gap:6px;margin-bottom:8px}
.sp-step{flex:1;height:3px;border-radius:2px;background:var(--border)}
.sp-step.done{background:var(--green)}
.sp-step.active{background:var(--green);opacity:.5}
.sp-lbl{font-size:12px;color:var(--muted);padding-bottom:10px}
.sp-lbl span{font-weight:600;color:var(--green)}
.sp-hdr{padding:8px 20px 18px}
.sp-num{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:4px}
.sp-ttl{font-family:'Fraunces',serif;font-size:24px;font-weight:300;letter-spacing:-.5px;line-height:1.15;margin-bottom:6px}
.sp-ttl em{font-style:italic;color:var(--green)}
.sp-sub{font-size:14px;color:var(--muted);line-height:1.5}
.field{margin-bottom:14px}
.field-lbl{font-size:13px;font-weight:500;margin-bottom:6px;display:block}
.field input,.field select,.field textarea{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--text);outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:none;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.funit{position:relative}
.funit input{padding-right:50px}
.funit-lbl{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;pointer-events:none}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chips.col{flex-direction:column;align-items:flex-start}
.chip{padding:9px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:all .15s}
.chip.full{width:100%;border-radius:var(--radius-sm)}
.chip.sel{background:var(--green-light);border-color:var(--green);color:var(--green-deep)}
.chip-ic{font-size:15px}
.sldr-wrap{padding:4px 0}
.sldr-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px}
input[type=range]{width:100%;height:4px;border-radius:2px;background:rgba(0,0,0,.1);outline:none;cursor:pointer;-webkit-appearance:none}
input[type=range]::-webkit-slider-thumb{width:22px;height:22px;border-radius:50%;background:var(--green);border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;-webkit-appearance:none}
.sldr-val{text-align:center;font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);margin-top:8px}
.hint-box{background:var(--green-light);border:1px solid rgba(26,122,74,.15);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:10px;margin-bottom:14px}
.hint-txt{font-size:13px;color:var(--green-deep);line-height:1.5}
.av-big{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;border:3px solid var(--green);flex-shrink:0;overflow:hidden;cursor:pointer}
.av-big img{width:100%;height:100%;object-fit:cover}
.cdots{display:flex;gap:10px;flex-wrap:wrap}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cdot.sel{border-color:#111;transform:scale(1.2)}
.ai-gen-box{background:var(--green-light);border-radius:var(--radius);border:1px solid rgba(26,122,74,.15);padding:20px;text-align:center}
.ai-gen-spin{width:40px;height:40px;border:3px solid rgba(26,122,74,.2);border-top-color:var(--green);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 12px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-gen-icon{font-size:32px;margin-bottom:10px}
.ai-gen-ttl{font-size:15px;font-weight:500;color:var(--green-deep);margin-bottom:6px}
.ai-gen-sub{font-size:13px;color:var(--muted);line-height:1.5}
.ai-gen-result{font-size:13px;color:#1f4a30;line-height:1.7;margin-top:12px;text-align:left;display:none;border-top:1px solid rgba(26,122,74,.15);padding-top:12px}
.ps-summary{background:var(--green);border-radius:var(--radius);padding:18px;color:white;margin-bottom:14px}
.ps-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;margin-bottom:10px;overflow:hidden}
.ps-av img{width:100%;height:100%;object-fit:cover}
.ps-name{font-family:'Fraunces',serif;font-size:20px;font-weight:400;margin-bottom:4px}
.ps-sub{font-size:13px;opacity:.75;margin-bottom:10px}
.ps-pills{display:flex;gap:6px;flex-wrap:wrap}
.ps-pill{background:rgba(255,255,255,.18);padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500}
.nav-btns{position:fixed;bottom:0;left:0;right:0;background:rgba(247,248,246,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 20px calc(12px + var(--safe-bottom));display:flex;gap:10px;z-index:30}
.btn-back-sp{flex:1;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer}
.btn-nxt-sp{flex:2;padding:13px;background:var(--green);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-nxt-sp:active{opacity:.85}
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}

/* ═══════════════════════════════════════════════
   RESPONSIVE — Tablet & Desktop
═══════════════════════════════════════════════ */
@media (min-width: 700px){
  body{
    background:#dce5dc;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  #app-shell{
    width:100%;
    max-width:480px;
    background:var(--bg);
    min-height:100vh;
    position:relative;
    box-shadow:0 0 80px rgba(0,0,0,.18);
  }
  /* Nav centered below app shell */
  .bottom-nav{
    max-width:480px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
  }
  /* Toast follows app width */
  .toast{
    /* already uses left:50% translateX(-50%) — works fine */
  }
  /* Login doesn't need full-page height treatment on desktop */
  #screen-login{
    min-height:100vh;
  }
  /* Chat — slide from bottom within app frame */
  .chat-modal{
    max-width:480px;
    margin:0 auto;
  }
  /* Weight modal centered */
  .wmodal{
    width:420px;
  }
  /* Setup wizard */
  #screen-setup .sp-inner{
    max-width:480px;
    margin:0 auto;
  }
}

@media (min-width:1024px){
  body{
    padding:24px 0;
    align-items:flex-start;
  }
  #app-shell{
    min-height:calc(100vh - 48px);
    border-radius:24px;
    overflow:hidden;
  }
  /* Keep bottom nav at the bottom of the shell, not the viewport */
  .bottom-nav{
    border-radius:0 0 24px 24px;
  }
}

/* Small phones — compact spacing */
@media (max-width:375px){
  .topbar h1{font-size:19px}
  .section{padding:0 14px}
  .card{padding:12px 14px}
  .nav-icon{font-size:19px}
  .nav-label{font-size:9px}
  .profiles{padding:0 14px 8px}
}
.evo-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.evo-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.evo-delta-up{font-size:10px;color:var(--green);font-weight:600}
.evo-delta-down{font-size:10px;color:var(--coral);font-weight:600}
.evo-delta-flat{font-size:10px;color:var(--muted)}
</style>

function calcWalkKcal(weight, speedKmh, incPct, mins){
  var met = 2.8 + Math.max(0,(speedKmh-3.2)*0.5) + incPct*0.35;
  return Math.round(met * weight * (mins/60));
}
function calcMusKcal(weight, totalSets){
  // MET=5 for weight training, ~2.2 min per set (work + rest)
  return Math.round(totalSets * weight * 0.18);
}
function getBasalKcal(p){
  if(p.bmr && p.bmr>0) return p.bmr;
  var g = p.gender || (pdOverride[curP]||{}).gender||'M';
  return Math.round(g==='M' ? 10*p.weight+6.25*p.height-5*p.age+5 : 10*p.weight+6.25*p.height-5*p.age-161);
}
function calcWorkoutKcalToday(pi){
  var idx = pi!=null?pi:curP; var p = PD[idx]; var day = curDay;
  var dw = p.weekly[day]||{};
  if(dw.rest||!dw.exs) return 0;
  var sets=0;
  dw.exs.forEach(function(ex,i){
    var k=idx+'-'+day+'-'+i; var ns=parseInt((ex.s.match(/^(\d+)/)||[0,3])[1])||3;
    for(var si=0;si<ns;si++){ if(exSets[k+'-s'+si]) sets++; }
  });
  var musK = calcMusKcal(p.weight, sets);
  var cardK = 0;
  var cselKey = idx+'-'+day;
  var selId = cardioSel[cselKey] || null;
  if(selId === 'walk'){
    var wp = walkParams[cselKey]||{inc:5, spd:5.5, mins:30};
    cardK = calcWalkKcal(p.weight, wp.spd, wp.inc, wp.mins);
  } else if(selId){
    var co = CARDIO_OPTS.find(function(o){ return o.id===selId; });
    if(co){ var pm = co.params.find(function(x){ return x.l==='Kcal'; }); if(pm) cardK = parseInt((pm.v||'0').replace('~',''))||0; }
  }
  return musK + cardK;
}

function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function kcalConsumedToday(pi){
  var idx=pi!=null?pi:curP;
  return (PD[idx]||{meals:[]}).meals.reduce(function(s,m,mi){
    // foodDone[key]===true means eaten; default is not eaten
    var mkey = idx+'-'+(m.id||'m'+mi);
    return s + m.foods.reduce(function(fs,f,fi){
      return fs+(foodDone[mkey+'-'+fi]===true ? (f.k||0) : 0);
    },0);
  },0);
}
function totalSetsDoneToday(pi){
  var idx=pi!=null?pi:curP; var p=PD[idx]; if(!p||!p.weekly) return 0;
  var tot=0;
  p.weekly.forEach(function(w,d){ if(w.rest||!w.exs) return; w.exs.forEach(function(ex,i){ var k=idx+'-'+d+'-'+i; var ns=parseInt((ex.s.match(/^(\d+)/)||[0,3])[1])||3; for(var si=0;si<ns;si++){ if(exSets[k+'-s'+si]) tot++; } }); });
  return tot;
}
var dayChangeHandled = false; // prevent double execution

function resetDailyState(){
  mealDone={}; suppDone={}; habitDone={}; foodDone={};
  exChecked={}; exSets={}; cardioChecked={};
  waterGlasses={}; sleepData={};
}

function handleDayChange(oldDate){
  if(dayChangeHandled) return; // already ran, skip
  dayChangeHandled = true;
  // backfill all missed days between oldDate and yesterday
  var today = new Date(); today.setHours(0,0,0,0);
  var cursor = new Date(oldDate+'T12:00:00');
  var datesToFill = [];
  while(cursor < today){
    datesToFill.push(cursor.toISOString().slice(0,10));
    cursor.setDate(cursor.getDate()+1);
  }
  if(datesToFill.length===0) datesToFill=[oldDate];

  // compute summary for the active profile before resetting
  var p0 = PD[curP];
  var kcal0 = kcalConsumedToday(curP);
  var basal0 = getBasalKcal(p0);
  var treino0 = calcWorkoutKcalToday(curP);
  var gasto0 = basal0 + treino0;
  var deficit0 = kcal0 - gasto0;
  var sleep0 = parseFloat(((sleepData[curP]||{hours:p0.sleep}).hours||0).toFixed(1));
  var mealsDone0 = p0.meals.filter(function(m,mi){ var mk=curP+'-'+(m.id||'m'+mi); return m.foods.some(function(_,fi){ return foodDone[mk+'-'+fi]===true; }); }).length;
  var water0 = Math.round((waterGlasses[curP+'-water']||0)*250);
  var suppDone0 = p0.supps.filter(function(_,i){ return suppDone[curP+'-'+i]; }).length;
  // workout summary
  var w0 = p0.weekly[curDay]||{};
  var workout0 = null;
  if(!w0.rest && w0.exs && w0.exs.length>0){
    var totalSets0=0, doneSets0=0;
    w0.exs.forEach(function(ex,i){
      var k=curP+'-'+curDay+'-'+i;
      var ns=parseInt((ex.s.match(/^(\d+)/)||[0,3])[1])||3;
      totalSets0+=ns;
      for(var si=0;si<ns;si++){ if(exSets[k+'-s'+si]) doneSets0++; }
    });
    workout0 = {name:w0.name, done:doneSets0, total:totalSets0};
  }
  // auto highlight
  var highlights0 = [];
  if(deficit0<=0 && kcal0>0) highlights0.push('🎯 Meta calórica atingida');
  if(sleep0>=(p0.sleepTarget||7.5)) highlights0.push('😴 Meta de sono atingida');
  if(mealsDone0===p0.meals.length) highlights0.push('🍽 Todas as refeições registradas');
  if(workout0 && workout0.done===workout0.total && workout0.total>0) highlights0.push('💪 Treino 100% completo');
  if(water0>=(p0.water||2500)) highlights0.push('💧 Meta de hidratação atingida');
  var highlight0 = highlights0.length>=3 ? '🔥 Dia completo!' : highlights0.length>0 ? highlights0[0] : null;
  var oldDateLabel = new Date(oldDate+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var oldDateFull = new Date(oldDate+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}).replace(/ De /g,' de ');

  PD.forEach(function(p,pi){
    if(!historyData[pi]) historyData[pi]=[];
    var imc=parseFloat((p.weight/Math.pow(p.height/100,2)).toFixed(1));
    var sleepEntry=sleepData[pi]||{hours:p.sleep};
    var kcal=kcalConsumedToday(pi);
    var gasto=getBasalKcal(p)+calcWorkoutKcalToday(pi);
    var deficit=kcal>0?kcal-gasto:null;
    var waterMl=Math.round((waterGlasses[pi+'-water']||0)*250);
    datesToFill.forEach(function(dateStr){
      var existing=historyData[pi].find(function(e){return e.date===dateStr;});
      if(!existing){
        var d=new Date(dateStr+'T12:00:00');
        var lbl=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        historyData[pi].push({date:dateStr,label:lbl,weight:p.weight,imc:imc,fat:null,sleep:sleepEntry.hours,avg:p.scores?Math.round((p.scores.Saude+p.scores.Fitness+p.scores.Sono+p.scores.Nutricao)/4):0,scores:p.scores,calories:kcal>0?kcal:p.calories,gasto:gasto,deficit:deficit,water:waterMl>0?waterMl:null});
      }
    });
    historyData[pi].sort(function(a,b){ return a.date<b.date?-1:1; });
  });

  // reset IMMEDIATELY — don't wait for popup confirmation
  resetDailyState();
  curDay = (new Date().getDay()+6)%7;
  curDayManualOverride = false;
  save();
  // show summary popup as informational only (no longer gates the reset)
  if(datesToFill.length===1){
    showDaySummary(oldDateFull, kcal0, basal0, treino0, gasto0, deficit0, sleep0, mealsDone0, p0.meals.length, water0, suppDone0, p0.supps.length, workout0, highlight0);
  }
}

var saveCloudTimer = null;
var saveCount = 0;

function isCriticalDataValid(){
  // Check if pdOverride has meaningful data for at least one profile
  return Object.keys(pdOverride).some(function(k){
    var o = pdOverride[k];
    return o && (o.name || o.weight || (o.meals && o.meals.length>0) || (o.weekly));
  }) || historyData && Object.keys(historyData).some(function(k){
    return historyData[k] && historyData[k].length>0;
  });
}

function saveBackup(){
  try{
    var current = localStorage.getItem('mh_v4');
    if(current && isCriticalDataValid()){
      localStorage.setItem('mh_v4_bak', current);
    }
  }catch(e){}
}

function save(immediate){
  try{
    // Every 5 saves, take a backup of the previous state
    saveCount++;
    if(saveCount % 5 === 0) saveBackup();

    localStorage.setItem('mh_v4',JSON.stringify({
      curP,curDay,mealDone,foodDone,suppDone,habitDone,
      exChecked,exSets,exWeights,cardioSel,cardioChecked,walkParams,
      waterGlasses,sleepData,expandedExam,profileComplete,pdOverride,chatHistories,historyData,
      lastSavedDate:todayStr(),
      avatars: PD.map(function(p){ return {avatarImg:p.avatarImg, progressPhotos:p.progressPhotos}; })
    }));
  }catch(e){}
  if(immediate){
    if(saveCloudTimer){ clearTimeout(saveCloudTimer); saveCloudTimer=null; }
    saveToCloud();
  } else {
    if(saveCloudTimer) clearTimeout(saveCloudTimer);
    saveCloudTimer = setTimeout(saveToCloud, 1000);
  }
}

function restoreBackup(){
  try{
    var bak = localStorage.getItem('mh_v4_bak');
    if(!bak){ showToast('Nenhum backup disponível.'); return; }
    var s = JSON.parse(bak);
    if(!confirm('Restaurar backup de '+s.lastSavedDate+'? O estado atual será perdido.')) return;
    localStorage.setItem('mh_v4', bak);
    showToast('Backup restaurado. Recarregando...');
    setTimeout(function(){ location.reload(); }, 1000);
  }catch(e){ showToast('Erro ao restaurar backup.'); }
}
function load(){
  try{
    var d = localStorage.getItem('mh_v4');
    if(!d) return false;
    var s = JSON.parse(d);
    curP = s.curP||0; curDay = s.curDay||curDay;
    mealDone = s.mealDone||{}; foodDone = s.foodDone||{}; suppDone = s.suppDone||{};
    habitDone = s.habitDone||{}; exChecked = s.exChecked||{};
    exSets = s.exSets||{}; exWeights = s.exWeights||{}; cardioSel = s.cardioSel||{};
    cardioChecked = s.cardioChecked||{}; walkParams = s.walkParams||{}; waterGlasses = s.waterGlasses||{};
    sleepData = s.sleepData||{}; expandedExam = s.expandedExam||{};
    profileComplete = s.profileComplete||false;
    pdOverride = s.pdOverride||{};
    chatHistories = s.chatHistories||{};
    historyData = s.historyData||{};
    // Auto-reset if day changed
    if(s.lastSavedDate && s.lastSavedDate !== todayStr()) handleDayChange(s.lastSavedDate);
    Object.keys(pdOverride).forEach(function(idx){
      var i = parseInt(idx); if(!PD[i]) return;
      var o = pdOverride[idx];
      if(o.calories!=null) PD[i].calories = o.calories; // localStorage always wins
      if(o.protein!=null) PD[i].protein = o.protein;
      if(o.carbs!=null) PD[i].carbs = o.carbs;
      if(o.fat!=null) PD[i].fat = o.fat;
      if(o.water!=null) PD[i].water = o.water;
      if(o.weekly) PD[i].weekly = o.weekly;
      if(o.meals && o.meals.length > 0){
        // sanity check: if all meals share the same id/name, data is corrupt — auto-clear
        var ids = o.meals.map(function(m){ return (m.id||m.name||'').toLowerCase(); });
        var allSame = ids.every(function(v){ return v === ids[0]; });
        if(!allSame){
          // migration: insert missing lanche2 from defaults if not present
          var hasLanche2 = o.meals.some(function(m){ return (m.id||'').indexOf('lanche2')>=0||(m.name||'').toLowerCase().indexOf('tarde')>=0; });
          if(!hasLanche2 && PD_DEFAULT_MEALS[i]){
            var defLanche2 = PD_DEFAULT_MEALS[i].meals.find(function(m){ return m.id==='lanche2'; });
            if(defLanche2){
              // insert after almoco
              var almocoIdx = o.meals.findIndex(function(m){ return (m.id||'').indexOf('almoco')>=0; });
              if(almocoIdx>=0) o.meals.splice(almocoIdx+1,0,defLanche2);
              else o.meals.push(defLanche2);
            }
          }
          // migration: update old meal times to new schedule
          var timeMap = {'cafe':'08:00','lanche1':'10:30','almoco':'13:00','lanche2':'16:00','jantar':'20:00'};
          o.meals.forEach(function(m){ if(timeMap[m.id]) m.time = timeMap[m.id]; });
          PD[i].meals = o.meals;
        } else delete o.meals;
      }
      if(o.sleep!=null) PD[i].sleep = o.sleep;
      if(o.sleepTarget!=null) PD[i].sleepTarget = o.sleepTarget;
      if(o.scores) PD[i].scores = o.scores;
      if(o.insight) PD[i].insight = o.insight;
      if(o.name) PD[i].name = o.name;
      if(o.initials) PD[i].initials = o.initials;
      if(o.age) PD[i].age = o.age;
      if(o.weight) PD[i].weight = o.weight;
      if(o.height) PD[i].height = o.height;
      if(o.goal) PD[i].goal = o.goal;
    });
    if(s.avatars){
      s.avatars.forEach(function(a,i){
        if(PD[i]){ PD[i].avatarImg = a.avatarImg||''; PD[i].progressPhotos = a.progressPhotos||PD[i].progressPhotos; }
      });
    }
    applyResetMealsFlag();
    // Sanity check: if profileComplete but no meaningful pdOverride, check backup
    if(profileComplete && !isCriticalDataValid()){
      var bak = localStorage.getItem('mh_v4_bak');
      if(bak){
        try{
          var bs = JSON.parse(bak);
          if(bs.pdOverride && Object.keys(bs.pdOverride).length>0){
            console.warn('Main data seems empty, restoring from backup');
            pdOverride = bs.pdOverride;
            historyData = bs.historyData||historyData;
            // re-apply overrides from backup
            Object.keys(pdOverride).forEach(function(idx){
              var i=parseInt(idx); if(!PD[i]) return;
              var o=pdOverride[idx];
              if(o.name) PD[i].name=o.name;
              if(o.weight) PD[i].weight=o.weight;
              if(o.meals && o.meals.length>0) PD[i].meals=o.meals;
              if(o.weekly) PD[i].weekly=o.weekly;
              if(o.calories) PD[i].calories=o.calories;
            });
          }
        }catch(e){}
      }
    }
    return true;
  }catch(e){ return false; }
}

// ── WAKE LOCK — prevent screen from sleeping while app is open ──
var wakeLock = null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{
    if(wakeLock) return; // already active
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', function(){ wakeLock = null; });
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release(); wakeLock = null; }
}
// re-acquire when app comes back to foreground
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    requestWakeLock();
    if(Notification.permission==='granted') scheduleNotifications();
    // check if rest timer expired while app was in background
    if(restTimer.endTime>0 && restTimer.interval){
      var msLeft = restTimer.endTime - Date.now();
      if(msLeft<=0){
        clearInterval(restTimer.interval); restTimer.interval=null;
        playTimerBeep(function(){ setTimeout(closeRestTimer,600); });
        if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      }
    }
  } else {
    save(true);
    releaseWakeLock();
  }
});

function updateOnlineStatus(){
  var badge = document.getElementById('offline-badge');
  var sync = document.getElementById('sync-status');
  if(!badge) return;
  if(navigator.onLine){
    badge.style.display = 'none';
    if(sync) sync.style.display = 'flex';
    save(true); // sync any changes made offline
  } else {
    badge.style.display = 'block';
    if(sync) sync.style.display = 'none';
  }
}

window.addEventListener('offline', updateOnlineStatus);

function calcStreak(){
  var hist = (historyData[curP]||[]).slice().sort(function(a,b){ return a.date>b.date?-1:1; });
  if(!hist.length) return 0;
  var streak = 0;
  var today = todayStr();
  var cursor = new Date(today+'T12:00:00');
  for(var i=0; i<hist.length; i++){
    var d = cursor.toISOString().slice(0,10);
    var entry = hist.find(function(e){ return e.date===d; });
    if(!entry) break;
    // day counts if sleep was logged or score exists
    if(entry.avg>0 || entry.sleep>0) streak++;
    else break;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

function calcWeeklySummary(){
  var hist = historyData[curP]||[];
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7);
  var cutStr = cutoff.toISOString().slice(0,10);
  var week = hist.filter(function(e){ return e.date>=cutStr; });
  if(!week.length) return null;
  var avgSleep = (week.reduce(function(s,e){ return s+(e.sleep||0); },0)/week.length).toFixed(1);
  var avgScore = Math.round(week.reduce(function(s,e){ return s+(e.avg||0); },0)/week.length);
  var deficits = week.filter(function(e){ return e.deficit!=null; });
  var avgDeficit = deficits.length ? Math.round(deficits.reduce(function(s,e){ return s+e.deficit; },0)/deficits.length) : null;
  var waters = week.filter(function(e){ return e.water>0; });
  var avgWater = waters.length ? Math.round(waters.reduce(function(s,e){ return s+e.water; },0)/waters.length) : null;
  return {days:week.length, avgSleep:avgSleep, avgScore:avgScore, avgDeficit:avgDeficit, avgWater:avgWater};
}

  h += '<div style="margin:14px 0 4px">';

var restTimer={interval:null,remaining:0,total:0,endTime:0};

// Single persistent AudioContext — unlocked on first user touch
var globalAC = null;
function getAudioContext(){
  if(!globalAC || globalAC.state==='closed'){
    try{ globalAC = new(window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  }
  return globalAC;
}
function unlockAudioContext(){
  var ac = getAudioContext(); if(!ac) return;
  if(ac.state==='suspended'){
    ac.resume().then(function(){
      // play silent buffer to fully unlock on iOS
      var buf=ac.createBuffer(1,1,22050);
      var src=ac.createBufferSource(); src.buffer=buf;
      src.connect(ac.destination); src.start(0);
    }).catch(function(){});
  }
}
// Unlock on first touch anywhere in the app
document.addEventListener('touchstart', unlockAudioContext, {once:true, passive:true});
document.addEventListener('click', unlockAudioContext, {once:true, passive:true});

  panel.querySelectorAll('.rt-preset').forEach(function(btn){

  });

function startRestCountdown(totalSecs){
  var presetsEl=document.getElementById('rt-presets');
  var countdownEl=document.getElementById('rt-countdown');
  if(!presetsEl||!countdownEl) return;
  presetsEl.style.display='none';
  countdownEl.style.display='block';
  // set audio session to playback NOW so iOS keeps audio alive in background
  try{ if(navigator.audioSession) navigator.audioSession.category='playback'; }catch(e){}
  // keep AudioContext alive and resumed during timer
  var ac=getAudioContext();
  if(ac && ac.state==='suspended') ac.resume().catch(function(){});
  var circle=document.getElementById('rt-circle');
  var timeEl=document.getElementById('rt-time');
  var circ=402;
  restTimer.remaining=totalSecs; restTimer.total=totalSecs;
  restTimer.endTime = Date.now() + totalSecs*1000; // absolute end time survives background
  function tick(){
    // recalculate from absolute end time — works correctly after background/foreground
    var msLeft = restTimer.endTime - Date.now();
    restTimer.remaining = Math.max(0, Math.round(msLeft/1000));
    var pct=restTimer.remaining/restTimer.total;
    if(circle) circle.setAttribute('stroke-dashoffset',(circ*(1-pct)).toFixed(1));
    if(circle) circle.style.stroke=pct>0.4?'var(--green)':pct>0.15?'#f59e0b':'var(--coral)';
    var m=Math.floor(restTimer.remaining/60),s=restTimer.remaining%60;
    if(timeEl) timeEl.textContent=m+':'+(s<10?'0':'')+s;
    if(restTimer.remaining<=0){
      clearInterval(restTimer.interval); restTimer.interval=null;
      playTimerBeep(function(){ setTimeout(closeRestTimer,600); });
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      return;
    }
  }
  tick();
  restTimer.interval=setInterval(tick,500); // 500ms for smoother catch-up after background
}
function playTimerBeep(onEnd){
  try{
    if(navigator.audioSession) navigator.audioSession.category = 'playback';
    var ac = getAudioContext(); if(!ac){ if(onEnd) onEnd(); return; }
    var resume = ac.state==='suspended' ? ac.resume() : Promise.resolve();
    resume.then(function(){
      var now = ac.currentTime;
      [0, 0.22, 0.44].forEach(function(t){
        var o=ac.createOscillator(), g=ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type='sine'; o.frequency.value=880;
        g.gain.setValueAtTime(0, now+t);
        g.gain.linearRampToValueAtTime(0.6, now+t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, now+t+0.19);
        o.start(now+t); o.stop(now+t+0.2);
      });
      setTimeout(function(){
        try{ if(navigator.audioSession) navigator.audioSession.category='ambient'; }catch(e){}
        if(onEnd) onEnd();
      }, 1200);
    }).catch(function(){ if(onEnd) onEnd(); });
    if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
  }catch(e){ if(onEnd) onEnd(); }
}

function closeRestTimer(){
  if(restTimer.interval){ clearInterval(restTimer.interval); restTimer.interval=null; }
  var ov=document.getElementById('rest-timer-overlay');
  if(ov) ov.remove();
  // restore ambient so Spotify resumes after timer closes
  try{ if(navigator.audioSession) navigator.audioSession.category='ambient'; }catch(e){}
}
function playExerciseDone(){
  try{
    if(navigator.audioSession) navigator.audioSession.category = 'playback';
    var ac=getAudioContext(); if(!ac) return;
    var resume = ac.state==='suspended' ? ac.resume() : Promise.resolve();
    resume.then(function(){
      var now=ac.currentTime;
      [[523,0],[659,0.13],[784,0.26]].forEach(function(nf){
        var o=ac.createOscillator(), g=ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type='sine'; o.frequency.value=nf[0];
        g.gain.setValueAtTime(0.5, now+nf[1]);
        g.gain.exponentialRampToValueAtTime(0.001, now+nf[1]+0.4);
        o.start(now+nf[1]); o.stop(now+nf[1]+0.4);
      });
      setTimeout(function(){ try{ if(navigator.audioSession) navigator.audioSession.category='ambient'; }catch(e){} }, 900);
    }).catch(function(){});
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,300]);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([100,50,100,50,300]);
  showToast('Exercício completo! Próximo exercício ✓');
}

function getDietaTabByTime(){
  var h = new Date().getHours(), m = new Date().getMinutes();
  var t = h*60+m;
  if(t>=5*60  && t<10*60+30) return 'cafe';
  if(t>=10*60+30 && t<13*60) return 'lanche';
  if(t>=13*60 && t<16*60)    return 'almoco';
  if(t>=16*60 && t<20*60)    return 'lanche';
  if(t>=20*60 && t<23*60)    return 'jantar';
  return 'all';
}

function renderDieta(resetTab){
  if(resetTab) dietaTab = getDietaTabByTime();
  renderProfiles('dieta-profiles');
  document.getElementById('dieta-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var tabs = ['all','cafe','lanche','almoco','jantar','supp'];
  var labels = ['Tudo','Cafe','Lanche','Almoco','Jantar','Suplementos'];
  var th = '';
  tabs.forEach(function(t,i){
    th += '<button class="tab" style="'+(dietaTab===t?'background:var(--green);color:#fff;border-color:var(--green)':'')+'" data-dtab="'+t+'">'+labels[i]+'</button>';
  });
  document.getElementById('dieta-tabs').innerHTML = th;
  document.querySelectorAll('[data-dtab]').forEach(function(btn){
    btn.addEventListener('click', function(){ dietaTab=this.dataset.dtab; renderDieta(); });
  });
  renderDietaContent();
}

function resetDietaPlan(){
  if(!confirm('Restaurar o plano alimentar original? As alteracoes feitas serao perdidas.')) return;
  // Store flag in localStorage — applied AFTER Firebase reload to override corrupt Firebase data
  localStorage.setItem('mh_reset_meals', String(curP));
  location.reload();
}
function applyResetMealsFlag(){
  var flag = localStorage.getItem('mh_reset_meals');
  if(flag === null) return;
  var pi = parseInt(flag);
  localStorage.removeItem('mh_reset_meals');
  if(!PD[pi]) return;
  PD[pi].meals = JSON.parse(JSON.stringify(PD_DEFAULT_MEALS[pi].meals));
  PD[pi].supps = JSON.parse(JSON.stringify(PD_DEFAULT_MEALS[pi].supps));
  if(pdOverride[pi]){ delete pdOverride[pi].meals; delete pdOverride[pi].supps; delete pdOverride[pi].calories; }
  foodDone = {};
  save();
}

  var sDone = p.supps.filter(function(_,i){ return suppDone[curP+'-'+i]; }).length;
  var wk2 = curP+'-water'; var glasses = waterGlasses[wk2]||0; var totalG = Math.round(p.water/250);
  var kcalConsumed = kcalConsumedToday(); var kcalPct = Math.min(100, Math.round(kcalConsumed/p.calories*100));
  var kcalLeft = Math.max(0, p.calories - kcalConsumed); var kcalOver = Math.max(0, kcalConsumed - p.calories);

  if(dietaTab==='all'||dietaTab==='cafe'||dietaTab==='almoco'||dietaTab==='jantar'){
    var tot = p.protein*4+p.carbs*4+p.fat*9;
    var pp = Math.round(p.protein*4/tot*100); var cp = Math.round(p.carbs*4/tot*100); var fp = Math.round(p.fat*9/tot*100);
    var r=38,cx=44,cy=44,circ=2*Math.PI*r,g=2;

    // Daily kcal progress ring — target is main number, consumed fills the arc

    var consumedArc=cCirc*Math.min(1,kcalConsumed/p.calories);
    var ringColor=kcalOver>0?'#c0392b':kcalPct>=90?'#c47a1a':'#1a7a4a';

    h += '<circle cx="'+cCx+'" cy="'+cCy+'" r="'+cR+'" fill="none" stroke="'+ringColor+'" stroke-width="8" stroke-dasharray="'+(consumedArc-2)+' '+(cCirc-consumedArc+2)+'" stroke-dashoffset="'+(-cCirc/4)+'"/>';
    h += '</svg><div class="ring-center" style="cursor:pointer" id="btn-edit-kcal-goal"><div class="ring-kcal">'+p.calories+'</div><div class="ring-lbl">kcal meta ✏️</div></div></div>';

    if(kcalOver>0){
      h += '<div class="macro-row"><div class="macro-dot" style="background:#c0392b"></div><span class="macro-nm">Excesso</span><span class="macro-vl" style="color:#c0392b;font-weight:700">+'+kcalOver+' kcal</span></div>';
    } else {

    h += '<div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:10px;color:var(--muted)">0</span><span style="font-size:10px;font-weight:700;color:'+ringColor+'">'+kcalPct+'%</span><span style="font-size:10px;color:var(--muted)">'+p.calories+'</span></div></div>';
    h += '</div></div></div>';
    // macros breakdown (plan)
    h += '<div class="section"><div class="card" style="padding:12px 16px">';
    h += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Plano de macros</div>';
    [{c:'#1a7a4a',n:'Proteína',v:p.protein+'g',p:pp},{c:'#c47a1a',n:'Carboidrato',v:p.carbs+'g',p:cp},{c:'#1a5a8a',n:'Gordura',v:p.fat+'g',p:fp}].forEach(function(m){
      h += '<div class="macro-row"><div class="macro-dot" style="background:'+m.c+'"></div><span class="macro-nm">'+m.n+'</span>';
      h += '<div class="macro-bw"><div class="macro-bf" style="width:'+m.p+'%;background:'+m.c+'"></div></div>';

function adicionarAlimento(mealIdx){

  var panel = document.createElement('div');

    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">'+
      '<div>'+
        '<div style="font-family:Fraunces,serif;font-size:18px">Adicionar <em>alimento</em></div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+meal.name+'</div>'+
      '</div>'+
      '<button id="fadd-close" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer">✕</button>'+
    '</div>'+
    '<input id="fadd-name" type="text" placeholder="Nome do alimento (ex: ovo cozido)" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box;margin-bottom:10px">'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
      '<input id="fadd-porcao" type="text" placeholder="Porcao (ex: 2 unid)" style="flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box">'+
      '<input id="fadd-kcal" type="number" placeholder="kcal" style="width:90px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box">'+
    '</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Ou deixe a porcao e kcal em branco para a IA calcular automaticamente.</div>'+
    '<button id="fadd-btn" style="width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:DM Sans,sans-serif;cursor:pointer">Adicionar</button>';

  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  document.getElementById('fadd-close').addEventListener('click', function(){ overlay.remove(); });
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
  setTimeout(function(){ document.getElementById('fadd-name').focus(); }, 200);

  document.getElementById('fadd-btn').addEventListener('click', function(){
    var btn = this;
    var nome = document.getElementById('fadd-name').value.trim();
    if(!nome){ showToast('Informe o nome do alimento'); return; }
    var porcao = document.getElementById('fadd-porcao').value.trim();
    var kcalVal = parseInt(document.getElementById('fadd-kcal').value);

    function aplicar(n, po, k){
      meal.foods.push({n:n, p:po||'1 porcao', k:k||0});
      meal.kcal = meal.foods.reduce(function(s,f){ return s+(f.k||0); }, 0);
      if(!pdOverride[curP]) pdOverride[curP]={};
      pdOverride[curP].meals = p.meals;
      save(); overlay.remove();
      showToast('"'+n+'" adicionado ✓');
      renderDietaContent();
    }

    if(porcao && kcalVal > 0){
      aplicar(nome, porcao, kcalVal);
      return;
    }

    btn.disabled = true; btn.textContent = 'Calculando...';
    var instr = 'Qual a quantidade de calorias de "'+nome+'"'+(porcao?' na porcao "'+porcao+'"':'')+' ? Retorne SOMENTE JSON valido: {"n":"'+nome+'","p":"porcao padrao","k":NUMERO_INTEIRO}';
    fetch('/api/claude',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:100,
        system:'Voce e um nutricionista. Retorne apenas JSON valido sem texto.',
        messages:[{role:'user', content:instr}]})
    }).then(function(r){ return r.json(); }).then(function(data){
      var txt = data.content[0].text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
      var parsed = JSON.parse(txt);
      aplicar(parsed.n||nome, parsed.p||porcao||'1 porcao', parsed.k||0);
    }).catch(function(){
      aplicar(nome, porcao||'1 porcao', kcalVal||0);
    });
  });
}

  });
}

    btn.disabled = true; btn.textContent = 'Buscando...';
    var prompt = 'Substitua o exercicio "'+ex.n+'" ('+ex.s+') por '+(suggestion?'"'+suggestion+'"':'um exercicio equivalente')+
      ' para '+p.name+', '+p.age+' anos, '+p.weight+'kg, nivel '+((pdOverride[curP]||{}).trainingLevel||'intermediario')+
      ', objetivo: '+p.goal+'. Retorne APENAS JSON: {"n":"nome","s":"3x10-12","w":0,"m":"musculo trabalhado"}';
    fetch('/api/claude', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,messages:[{role:'user',content:prompt}]})
    }).then(function(r){ return r.json(); }).then(function(data){
      var txt = data.content[0].text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
      var parsed = JSON.parse(txt);
      if(!parsed.n) throw new Error('invalid');
      p.weekly[dayIdx].exs[exIdx] = {n:parsed.n, s:parsed.s||ex.s, w:parsed.w||0, m:parsed.m||ex.m};
      if(!pdOverride[curP]) pdOverride[curP]={};
      pdOverride[curP].weekly = p.weekly;
      save(); overlay.remove();
      showToast('"'+ex.n+'" trocado por "'+parsed.n+'" ✓');
      renderTreinosContent();
    }).catch(function(){
      btn.disabled = false; btn.textContent = 'Trocar com IA';
      showToast('Nao foi possivel trocar. Tente novamente.');
    });
  });
}

function removerExercicio(dayIdx, exIdx){
  var p = PD[curP];
  var day = p.weekly[dayIdx];
  if(!day || !day.exs || !day.exs[exIdx]) return;
  var nome = day.exs[exIdx].n;
  day.exs.splice(exIdx, 1);
  if(!pdOverride[curP]) pdOverride[curP]={};
  pdOverride[curP].weekly = p.weekly;
  save();
  showToast('"'+nome+'" removido ✓');
  renderTreinosContent();
}

function adicionarExercicio(dayIdx){
  var p = PD[curP];
  var day = p.weekly[dayIdx];
  if(!day || day.rest) return;

  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;display:flex;align-items:flex-end';
  var panel = document.createElement('div');
  panel.style.cssText = 'background:var(--card);border-radius:24px 24px 0 0;width:100%;padding:20px 20px calc(20px + var(--safe-bottom))';
  panel.innerHTML =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">'+
      '<div>'+
        '<div style="font-family:Fraunces,serif;font-size:18px">Adicionar <em>exercicio</em></div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+day.name+'</div>'+
      '</div>'+
      '<button id="exadd-close" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer">✕</button>'+
    '</div>'+
    '<input id="exadd-name" type="text" placeholder="Nome do exercicio (ex: agachamento bulgaro)" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box;margin-bottom:10px">'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<input id="exadd-series" type="text" placeholder="Series (ex: 3x12)" style="flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box">'+
      '<input id="exadd-peso" type="number" placeholder="kg" style="width:80px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;background:var(--surface);color:var(--text);box-sizing:border-box">'+
    '</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Deixe series em branco para a IA sugerir o volume adequado.</div>'+
    '<button id="exadd-btn" style="width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:DM Sans,sans-serif;cursor:pointer">Adicionar</button>';

  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  document.getElementById('exadd-close').addEventListener('click', function(){ overlay.remove(); });
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
  setTimeout(function(){ document.getElementById('exadd-name').focus(); }, 200);

  document.getElementById('exadd-btn').addEventListener('click', function(){
    var btn = this;
    var nome = document.getElementById('exadd-name').value.trim();
    if(!nome){ showToast('Informe o nome do exercicio'); return; }
    var series = document.getElementById('exadd-series').value.trim();
    var peso = parseFloat(document.getElementById('exadd-peso').value) || 0;

    function aplicar(n, s, w){
      day.exs.push({n:n, s:s||'3x12', w:w||0});
      if(!pdOverride[curP]) pdOverride[curP]={};
      pdOverride[curP].weekly = p.weekly;
      save(); overlay.remove();
      showToast('"'+n+'" adicionado ✓');
      renderTreinosContent();
    }

    if(series){ aplicar(nome, series, peso); return; }

    btn.disabled = true; btn.textContent = 'Calculando...';
    var prompt = 'Sugira o volume ideal (series x reps) para o exercicio "'+nome+'" para '+p.name+
      ', '+p.age+' anos, '+p.weight+'kg, nivel '+((pdOverride[curP]||{}).trainingLevel||'intermediario')+
      ', objetivo: '+p.goal+'. Retorne APENAS JSON: {"n":"'+nome+'","s":"3x12","w":0}';
    fetch('/api/claude',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:100,
        system:'Voce e um personal trainer. Retorne apenas JSON valido sem texto.',
        messages:[{role:'user', content:prompt}]})
    }).then(function(r){ return r.json(); }).then(function(data){
      var txt = data.content[0].text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
      var parsed = JSON.parse(txt);
      aplicar(parsed.n||nome, parsed.s||'3x12', peso||parsed.w||0);
    }).catch(function(){
      aplicar(nome, '3x12', peso);
    });
  });
}

function renderSono(){
  renderProfiles('sono-profiles');
  document.getElementById('sono-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  renderSonoContent();
}

function renderSonoContent(){
  var p = PD[curP];
  var entry = sleepData[curP] || {hours:p.sleep, quality:3};
  var score = p.sleepScore;
  var label = score>=85?'Excelente':score>=70?'Bom':score>=55?'Regular':'Precisa melhorar';
  var hDone = p.habits.filter(function(_,i){ return habitDone[curP+'-'+i]; }).length;
  var h = '';

  h += '<div class="section"><div class="score-hero">';
  h += '<div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.08em;font-family:DM Mono,monospace;margin-bottom:6px">Score de sono</div>';
  h += '<div class="hero-score">'+score+'</div>';
  h += '<div class="hero-tag">'+label+'</div>';
  h += '<div class="hero-meta">';
  var eH=Math.floor(entry.hours), eM=Math.round((entry.hours-eH)*60);
  var sleepDisp=eH+'h'+(eM>0?' '+eM+'min':'');
  h += '<div><div class="hm-val">'+sleepDisp+'</div><div class="hm-lbl">Dormido</div></div>';
  h += '<div><div class="hm-val">'+p.sleepTarget+'h</div><div class="hm-lbl">Meta</div></div>';
  h += '<div><div class="hm-val">'+hDone+'/'+p.habits.length+'</div><div class="hm-lbl">Habitos</div></div>';
  h += '</div></div></div>';

  // Registrar
  var sH=Math.floor(entry.hours), sM=Math.round((entry.hours-sH)*60);
  h += '<div class="section"><div class="sec-label">Registrar sono</div><div class="card" style="padding:0;overflow:hidden">';
  h += '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">';
  h += '<div style="font-size:14px;font-weight:500;margin-bottom:12px">Horas dormidas</div>';
  h += '<div style="display:flex;align-items:center;gap:16px">';
  var spinBtn = 'width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:20px;cursor:pointer;line-height:1';
  var spinInp = 'width:54px;font-size:24px;font-weight:700;font-family:DM Mono,monospace;text-align:center;border:2px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);padding:4px 2px;outline:none;-moz-appearance:textfield';
  // hours spinner
  h += '<div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px">';
  h += '<button style="'+spinBtn+'" id="sh-minus">−</button>';
  h += '<div style="text-align:center"><input type="number" min="0" max="14" value="'+sH+'" style="'+spinInp+'" id="s-hval"><div style="font-size:10px;color:var(--muted);margin-top:2px">horas</div></div>';
  h += '<button style="'+spinBtn+'" id="sh-plus">+</button>';
  h += '</div>';
  // divider
  h += '<div style="font-size:22px;font-weight:300;color:var(--muted)">:</div>';
  // minutes spinner
  h += '<div style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px">';
  h += '<button style="'+spinBtn+'" id="sm-minus">−</button>';
  h += '<div style="text-align:center"><input type="number" min="0" max="59" value="'+(sM<10?'0':'')+sM+'" style="'+spinInp+'" id="s-mval"><div style="font-size:10px;color:var(--muted);margin-top:2px">min</div></div>';
  h += '<button style="'+spinBtn+'" id="sm-plus">+</button>';
  h += '</div>';
  h += '</div></div>';
  h += '<div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between">';
  h += '<span style="font-size:14px;font-weight:500">Qualidade</span>';
  h += '<div style="display:flex;gap:6px">';
  ['😫','😔','😐','😊','😴'].forEach(function(em,i){
    var sel = entry.quality===i+1;
    h += '<button style="width:34px;height:34px;border-radius:8px;border:1.5px solid '+(sel?'var(--indigo)':'var(--border)')+';background:'+(sel?'var(--indigo-light)':'var(--surface)')+';font-size:18px;cursor:pointer" data-q="'+(i+1)+'">'+em+'</button>';
  });
  h += '</div></div></div></div>';

  h += '<div class="section"><div class="sec-label">Habitos de sono</div>';
  p.habits.forEach(function(hab,i){
    var key = curP+'-'+i; var done = !!habitDone[key];
    h += '<div class="habit-item" data-hkey="'+key+'">';
    h += '<span class="habit-icon-lbl">'+hab.icon+'</span>';
    h += '<div class="habit-info"><div class="habit-name'+(done?' done':'')+'">'+hab.name+'</div><div class="habit-tip">'+hab.tip+'</div></div>';
    h += '<div class="hcheck'+(done?' done':'')+'"></div></div>';
  });
  h += '</div>';

  h += '<div class="section"><div class="ai-card indigo"><div class="ai-hdr"><div class="ai-dot indigo"></div><span class="ai-ttl indigo">Sono IA</span></div>';
  h += '<div class="ai-txt indigo">'+p.insight+'</div></div></div>';
  h += '<div class="section"><div class="actions">';
  h += '<button class="act-btn" id="s-prot"><span class="act-icon">🌙</span><span class="act-lbl">Protocolo</span><span class="act-sub">Rotina noturna</span></button>';
  h += '<button class="act-btn" id="s-analise"><span class="act-icon">📊</span><span class="act-lbl">Analisar sono</span><span class="act-sub">Qualidade e melhorias</span></button>';
  h += '</div></div>';

  document.getElementById('sono-content').innerHTML = h;

  var entry2 = sleepData[curP] || {hours:p.sleep, quality:3};
  function sleepHM(){ return {h:Math.floor(entry2.hours), m:Math.round((entry2.hours-Math.floor(entry2.hours))*60)}; }
  function updateSleepDisplay(){
    var hm=sleepHM();
    document.getElementById('s-hval').value=hm.h;
    document.getElementById('s-mval').value=(hm.m<10?'0':'')+hm.m;
  }
  function setSleepHours(newH, newM){
    newH=Math.max(0,Math.min(14,newH)); newM=Math.max(0,Math.min(59,newM));
    entry2.hours=parseFloat((newH+newM/60).toFixed(4));
    sleepData[curP]=entry2; save(); updateSleepDisplay();
  }
  function readHM(){ return {h:parseInt(document.getElementById('s-hval').value)||0, m:parseInt(document.getElementById('s-mval').value)||0}; }
  document.getElementById('sh-minus').addEventListener('click',function(){ var hm=readHM(); setSleepHours(hm.h-1,hm.m); });
  document.getElementById('sh-plus').addEventListener('click',function(){ var hm=readHM(); setSleepHours(hm.h+1,hm.m); });
  document.getElementById('sm-minus').addEventListener('click',function(){ var hm=readHM(); var nm=hm.m-1; if(nm<0){nm=59; setSleepHours(hm.h-1,nm);}else{setSleepHours(hm.h,nm);} });
  document.getElementById('sm-plus').addEventListener('click',function(){ var hm=readHM(); var nm=hm.m+1; if(nm>=60){nm=0; setSleepHours(hm.h+1,nm);}else{setSleepHours(hm.h,nm);} });
  document.getElementById('s-hval').addEventListener('change',function(){ var hm=readHM(); setSleepHours(hm.h,hm.m); });
  document.getElementById('s-mval').addEventListener('change',function(){ var hm=readHM(); setSleepHours(hm.h,hm.m); });
  document.querySelectorAll('[data-q]').forEach(function(btn){
    btn.addEventListener('click', function(){ entry2.quality=parseInt(this.dataset.q); sleepData[curP]=entry2; save(); renderSonoContent(); });
  });
  document.querySelectorAll('.habit-item[data-hkey]').forEach(function(el){
    el.addEventListener('click', function(){ habitDone[this.dataset.hkey]=!habitDone[this.dataset.hkey]; save(); renderSonoContent(); });
  });
  var sp2=document.getElementById('s-prot'); var sa=document.getElementById('s-analise');
  if(sp2) sp2.addEventListener('click', function(){
    var hist = (historyData[curP]||[]).slice(-7);
    var avgH = hist.length ? (hist.reduce(function(s,e){ return s+(e.sleep||0); },0)/hist.length).toFixed(1) : entry.hours;
    var sysCtx = 'Voce e um especialista em sono e recuperacao. Perfil de '+p.name+' ('+p.age+' anos):\n';
    sysCtx += 'Media de sono: '+avgH+'h/noite. Meta: '+p.sleepTarget+'h. Qualidade atual: '+entry.quality+'/5. Score de sono: '+score+'.\n';
    sysCtx += 'Habitos noturnos: '+p.habits.map(function(h,i){ return h.n+(habitDone[curP+'-'+i]?' (feito)':' (nao feito)'); }).join(', ')+'.';
    openChatWithContext('sono-prot', sysCtx, 'Dados de sono carregados. Me pergunte sobre protocolo noturno, horarios, suplementos, ambiente ou habitos para melhorar seu sono.');
  });
  if(sa) sa.addEventListener('click', function(){
    var hist = (historyData[curP]||[]).slice(-14);
    var sysCtx = 'Voce e um especialista em analise de sono. Perfil de '+p.name+' ('+p.age+' anos):\n';
    sysCtx += 'Sono hoje: '+entry.hours+'h, qualidade '+entry.quality+'/5. Meta: '+p.sleepTarget+'h. Score: '+score+'.\n';
    if(hist.length>1) sysCtx += 'Historico ('+hist.length+' dias): '+hist.map(function(e){ return e.label+': '+e.sleep+'h'; }).join(', ')+'.\n';
    sysCtx += 'Habitos noturnos feitos hoje: '+p.habits.filter(function(_,i){ return habitDone[curP+'-'+i]; }).map(function(h){ return h.n; }).join(', ')||'nenhum';
    openChatWithContext('sono-analise', sysCtx, 'Historico de sono carregado. Me pergunte sobre qualidade, deficits, impacto na recuperacao, tendencias ou o que melhorar.');
  });
}
