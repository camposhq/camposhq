<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyHealth">
<title>MyHealth</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a7a4a;--green-light:#e8f5ee;--green-deep:#0f4f30;
  --orange:#c4621a;--orange-light:#fdf0e8;
  --blue:#1a5a8a;--blue-light:#e3f0fd;
  --indigo:#3730a3;--indigo-light:#eef2ff;
  --coral:#c0392b;--coral-light:#fdecea;
  --purple:#5a3ab7;--purple-light:#eeedfb;
  --amber:#c47a1a;--amber-light:#fdf3e3;
  --surface:#f7f8f6;--card:#fff;--text:#111310;--muted:#6b7068;
  --border:rgba(0,0,0,0.07);--radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100dvh}
.screen{display:none;min-height:100dvh;padding-bottom:calc(72px + var(--safe-bottom));padding-top:var(--safe-top);overflow-y:auto}
.screen.active{display:block}
.topbar{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10}
.topbar h1{font-family:'Fraunces',serif;font-size:22px;font-weight:400;letter-spacing:-.3px}
.topbar p{font-size:13px;color:var(--muted);margin-top:1px}
.ai-badge{background:var(--green);color:#fff;font-size:11px;font-weight:500;padding:5px 10px;border-radius:99px;font-family:'DM Mono',monospace;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(247,248,246,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));z-index:30}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;color:var(--muted);font-weight:500}
.nav-item.active .nav-label{font-weight:600;color:var(--green)}
.profiles{display:flex;gap:10px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.profiles::-webkit-scrollbar{display:none}
.profile-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;flex-shrink:0}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border:2.5px solid transparent;transition:border-color .2s;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.active{border-color:var(--green)}
.pname{font-size:11px;color:var(--muted)}
.section{padding:0 20px 14px}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.card-sm{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.metric-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px}
.metric-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.metric-unit{font-size:13px;color:var(--muted);font-weight:400}
.metric-label{font-size:12px;color:var(--muted);margin-top:4px}
.metric-trend{font-size:11px;margin-top:3px}
.trend-up{color:var(--green)}
.trend-down{color:var(--coral)}
.score-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.score-row:last-child{border-bottom:none}
.score-lbl{font-size:14px;flex:1}
.score-bw{flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden;margin:0 12px}
.score-bf{height:100%;border-radius:3px}
.score-num{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;min-width:26px;text-align:right}
.ai-card{border-radius:var(--radius);padding:14px;margin-bottom:0}
.ai-card.green{background:var(--green-light);border:1px solid rgba(26,122,74,.12)}
.ai-card.indigo{background:var(--indigo-light);border:1px solid rgba(55,48,163,.12)}
.ai-card.coral{background:var(--coral-light);border:1px solid rgba(192,57,43,.12)}
.ai-card.orange{background:var(--orange-light);border:1px solid rgba(196,98,26,.12)}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.ai-dot.green{background:var(--green)}
.ai-dot.indigo{background:var(--indigo)}
.ai-dot.coral{background:var(--coral)}
.ai-dot.orange{background:var(--orange)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-ttl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.ai-ttl.green{color:var(--green)}
.ai-ttl.indigo{color:var(--indigo)}
.ai-ttl.coral{color:var(--coral)}
.ai-ttl.orange{color:var(--orange)}
.ai-txt{font-size:13px;line-height:1.6}
.ai-txt.green{color:#1f4a30}
.ai-txt.indigo{color:#1e1b4b}
.ai-txt.coral{color:#4a1a14}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:left;cursor:pointer;transition:all .15s}
.act-btn:active{transform:scale(.97)}
.act-icon{font-size:18px;margin-bottom:6px;display:block}
.act-lbl{font-size:13px;font-weight:500;color:var(--text);display:block}
.act-sub{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.btn-full{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn-full:active{opacity:.85}
.btn-outline{width:100%;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
.prog-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-size:13px;font-weight:500}
.prog-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green)}
.prog-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px}
.stat-val{font-size:19px;font-weight:600;font-family:'DM Mono',monospace}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap}
.week-strip{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none}
.week-strip::-webkit-scrollbar{display:none}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 13px;border-radius:var(--radius-sm);border:1.5px solid transparent;background:var(--card);cursor:pointer;flex-shrink:0;transition:all .15s}
.day-btn.active{background:var(--green);border-color:var(--green)}
.day-btn.active .dlabel,.day-btn.active .dnum{color:#fff}
.day-btn.rest{background:var(--surface);border-color:var(--border)}
.dlabel{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.dnum{font-size:16px;font-weight:600;color:var(--text)}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--green)}
.day-btn.active .ddot{background:rgba(255,255,255,.5)}
.day-btn.rest .ddot{background:var(--border)}
.block-hdr{border-radius:var(--radius) var(--radius) 0 0;padding:14px 16px 12px;color:#fff}
.block-type{font-size:10px;font-weight:600;opacity:.75;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:3px}
.block-title{font-size:18px;font-weight:400;margin-bottom:10px;font-family:'Fraunces',serif}
.block-meta{display:flex;gap:16px}
.bmv{font-size:15px;font-weight:600}
.bml{font-size:11px;opacity:.7;margin-top:1px}
.ex-block{background:var(--card);border:1px solid var(--border);overflow:hidden;border-radius:0 0 var(--radius) var(--radius);border-top:none}
.ex-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.ex-row:last-child{border-bottom:none}
.ex-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500}
.ex-name.done{text-decoration:line-through;opacity:.4}
.ex-sets{font-size:11px;color:var(--muted);margin-top:2px}
.ex-wbtn{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;color:var(--text);min-width:48px;text-align:center;transition:all .15s;flex-shrink:0}
.ex-wbtn:active{background:var(--green-light);border-color:var(--green)}
.ex-wbtn.nw{color:var(--muted);font-weight:400;font-size:11px}
.ex-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;cursor:pointer}
.ex-check.done{background:var(--green);border-color:var(--green)}
.ex-check.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block}
.meal-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.meal-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer}
.meal-hdr-l{display:flex;align-items:center;gap:10px}
.meal-time{background:var(--green-light);color:var(--green-deep);font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:'DM Mono',monospace}
.meal-name{font-size:14px;font-weight:500}
.meal-kcal{font-size:12px;color:var(--muted);margin-top:1px}
.food-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-name{font-size:13px}
.food-portion{font-size:12px;color:var(--muted);margin-top:1px}
.food-kcal{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:var(--muted)}
.mcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;transition:all .15s;cursor:pointer}
.mcheck.done{background:var(--green);border-color:var(--green)}
.supp-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.supp-item:last-child{border-bottom:none}
.supp-icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.supp-info{flex:1}
.supp-name{font-size:14px;font-weight:500}
.supp-detail{font-size:12px;color:var(--muted);margin-top:1px}
.supp-time{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;font-family:'DM Mono',monospace;flex-shrink:0}
.scheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;transition:all .15s}
.scheck.done{background:var(--green);border-color:var(--green)}
.macro-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:18px}
.ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-kcal{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.ring-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.macros-detail{flex:1;display:flex;flex-direction:column;gap:7px}
.macro-row{display:flex;align-items:center;gap:7px}
.macro-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.macro-nm{font-size:12px;color:var(--muted);flex:1}
.macro-bw{flex:2;height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
.macro-bf{height:100%;border-radius:2px}
.macro-vl{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;min-width:36px;text-align:right}
.water-card{background:var(--blue-light);border-radius:var(--radius);border:1px solid rgba(26,90,138,.12);padding:14px}
.water-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.water-title{font-size:14px;font-weight:500;color:var(--blue)}
.water-val{font-size:18px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace}
.water-glasses{display:flex;gap:6px;flex-wrap:wrap}
.glass{width:34px;height:34px;border-radius:8px;border:1.5px solid rgba(26,90,138,.2);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.glass.filled{background:var(--blue);border-color:var(--blue);color:white}
.score-hero{background:var(--indigo);border-radius:var(--radius);padding:22px 20px;color:#fff;text-align:center;margin-bottom:10px}
.hero-score{font-family:'Fraunces',serif;font-size:68px;font-weight:300;line-height:1}
.hero-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:99px;padding:4px 14px;font-size:13px;font-weight:500;margin:8px 0 14px}
.hero-meta{display:flex;justify-content:center;gap:24px}
.hm-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.hm-lbl{font-size:11px;opacity:.65;margin-top:2px}
.habit-item{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px}
.habit-icon-lbl{font-size:22px;flex-shrink:0}
.habit-info{flex:1}
.habit-name{font-size:14px;font-weight:500}
.habit-name.done{text-decoration:line-through;opacity:.45}
.habit-tip{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.hcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.hcheck.done{background:var(--indigo);border-color:var(--indigo)}
.hcheck.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block}
.exam-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.exam-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.exam-hdr-l{display:flex;align-items:center;gap:10px}
.exam-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exam-name{font-size:14px;font-weight:500}
.exam-date{font-size:12px;color:var(--muted);margin-top:1px}
.s-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;font-family:'DM Mono',monospace;flex-shrink:0}
.s-ok{background:var(--green-light);color:var(--green)}
.s-alert{background:var(--amber-light);color:var(--amber)}
.s-danger{background:var(--coral-light);color:var(--coral)}
.marker-item{padding:10px 16px;border-bottom:1px solid var(--border)}
.marker-item:last-child{border-bottom:none}
.marker-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.marker-name{font-size:13px;font-weight:500}
.marker-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.marker-ref{font-size:11px;color:var(--muted)}
.marker-bw{height:5px;background:var(--surface);border-radius:3px;overflow:hidden}
.marker-bf{height:100%;border-radius:3px}
.upload-area{border:2px dashed rgba(192,57,43,.25);border-radius:var(--radius);padding:24px 20px;text-align:center;background:var(--coral-light);cursor:pointer}
.upload-area:active{border-color:var(--coral)}
.photo-angles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.angle-slot{border-radius:var(--radius-sm);border:2px dashed var(--border);background:var(--surface);aspect-ratio:.75;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;overflow:hidden;position:relative;transition:all .15s}
.angle-slot:active{border-color:var(--green)}
.angle-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.angle-lbl{font-size:11px;font-weight:500;color:var(--muted);z-index:1}
.angle-icon-lbl{font-size:24px;z-index:1}
.angle-date{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:#fff;background:rgba(0,0,0,.5);padding:2px 0;z-index:2}
.dash-hero{background:var(--green);border-radius:var(--radius);padding:20px;margin:0 20px 14px;color:white}
.dash-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dash-greeting{font-family:'Fraunces',serif;font-size:22px;font-weight:300}
.dash-score-row{display:flex;background:rgba(0,0,0,.15);border-radius:var(--radius-sm);overflow:hidden}
.dsi{flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.dsi:last-child{border-right:none}
.dsi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.dsi-lbl{font-size:10px;opacity:.7;margin-top:3px}
.wmodal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.wmodal-back.open{opacity:1;pointer-events:all}
.wmodal{background:var(--card);border-radius:var(--radius);padding:24px;width:280px;text-align:center}
.wmodal-title{font-size:16px;font-weight:500;margin-bottom:4px}
.wmodal-ex{font-size:13px;color:var(--muted);margin-bottom:16px}
.wmodal-input{width:100%;padding:14px;border:2px solid var(--green);border-radius:var(--radius-sm);font-size:28px;font-weight:600;font-family:'DM Mono',monospace;text-align:center;outline:none;color:var(--text);background:var(--surface);margin-bottom:6px}
.wmodal-unit{font-size:13px;color:var(--muted);margin-bottom:16px}
.wmodal-btns{display:flex;gap:10px}
.wmodal-cancel{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text)}
.wmodal-save{flex:2;padding:12px;background:var(--green);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;color:#fff}
.chat-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-back.open{opacity:1;pointer-events:all}
.chat-modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:88dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom)}
.chat-back.open .chat-modal{transform:translateY(0)}
.chat-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.chat-hdr{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-ttl{font-size:16px;font-weight:500}
.chat-sub{font-size:12px;color:var(--muted);margin-top:2px}
.chat-x{width:30px;height:30px;border-radius:50%;background:var(--surface);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-bbl{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.user .msg-bbl{background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bbl{background:var(--surface);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
.msg.assistant .msg-time{text-align:left}
.typing-wrap{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--surface);border-radius:16px;border-bottom-left-radius:4px;border:1px solid var(--border);width:fit-content}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.qps{display:flex;gap:8px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;flex-shrink:0}
.qps::-webkit-scrollbar{display:none}
.qp{flex-shrink:0;padding:7px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid rgba(26,122,74,.15);background:var(--green-light);color:var(--green-deep)}
.qp:active{background:var(--green);color:#fff}
.chat-inp-wrap{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-inp{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;background:var(--surface);color:var(--text);max-height:100px;line-height:1.4}
.chat-inp:focus{border-color:var(--green)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{opacity:.8}
.send-btn svg{width:18px;height:18px;fill:white}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.setup-wrap{min-height:100dvh;padding:var(--safe-top) 0 calc(80px + var(--safe-bottom))}
.sp-prog{position:sticky;top:var(--safe-top);background:var(--surface);padding:12px 20px 0;z-index:10}
.sp-steps{display:flex;gap:6px;margin-bottom:8px}
.sp-step{flex:1;height:3px;border-radius:2px;background:var(--border)}
.sp-step.done{background:var(--green)}
.sp-step.active{background:var(--green);opacity:.5}
.sp-lbl{font-size:12px;color:var(--muted);padding-bottom:10px}
.sp-lbl span{font-weight:600;color:var(--green)}
.sp-hdr{padding:8px 20px 18px}
.sp-num{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:4px}
.sp-ttl{font-family:'Fraunces',serif;font-size:24px;font-weight:300;letter-spacing:-.5px;line-height:1.15;margin-bottom:6px}
.sp-ttl em{font-style:italic;color:var(--green)}
.sp-sub{font-size:14px;color:var(--muted);line-height:1.5}
.field{margin-bottom:14px}
.field-lbl{font-size:13px;font-weight:500;margin-bottom:6px;display:block}
.field input,.field select,.field textarea{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--text);outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:none;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.funit{position:relative}
.funit input{padding-right:50px}
.funit-lbl{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;pointer-events:none}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chips.col{flex-direction:column;align-items:flex-start}
.chip{padding:9px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:all .15s}
.chip.full{width:100%;border-radius:var(--radius-sm)}
.chip.sel{background:var(--green-light);border-color:var(--green);color:var(--green-deep)}
.chip-ic{font-size:15px}
.sldr-wrap{padding:4px 0}
.sldr-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px}
input[type=range]{width:100%;height:4px;border-radius:2px;background:rgba(0,0,0,.1);outline:none;cursor:pointer;-webkit-appearance:none}
input[type=range]::-webkit-slider-thumb{width:22px;height:22px;border-radius:50%;background:var(--green);border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;-webkit-appearance:none}
.sldr-val{text-align:center;font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);margin-top:8px}
.hint-box{background:var(--green-light);border:1px solid rgba(26,122,74,.15);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:10px;margin-bottom:14px}
.hint-txt{font-size:13px;color:var(--green-deep);line-height:1.5}
.av-big{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;border:3px solid var(--green);flex-shrink:0;overflow:hidden;cursor:pointer}
.av-big img{width:100%;height:100%;object-fit:cover}
.cdots{display:flex;gap:10px;flex-wrap:wrap}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cdot.sel{border-color:#111;transform:scale(1.2)}
.ai-gen-box{background:var(--green-light);border-radius:var(--radius);border:1px solid rgba(26,122,74,.15);padding:20px;text-align:center}
.ai-gen-spin{width:40px;height:40px;border:3px solid rgba(26,122,74,.2);border-top-color:var(--green);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 12px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-gen-icon{font-size:32px;margin-bottom:10px}
.ai-gen-ttl{font-size:15px;font-weight:500;color:var(--green-deep);margin-bottom:6px}
.ai-gen-sub{font-size:13px;color:var(--muted);line-height:1.5}
.ai-gen-result{font-size:13px;color:#1f4a30;line-height:1.7;margin-top:12px;text-align:left;display:none;border-top:1px solid rgba(26,122,74,.15);padding-top:12px}
.ps-summary{background:var(--green);border-radius:var(--radius);padding:18px;color:white;margin-bottom:14px}
.ps-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;margin-bottom:10px;overflow:hidden}
.ps-av img{width:100%;height:100%;object-fit:cover}
.ps-name{font-family:'Fraunces',serif;font-size:20px;font-weight:400;margin-bottom:4px}
.ps-sub{font-size:13px;opacity:.75;margin-bottom:10px}
.ps-pills{display:flex;gap:6px;flex-wrap:wrap}
.ps-pill{background:rgba(255,255,255,.18);padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500}
.nav-btns{position:fixed;bottom:0;left:0;right:0;background:rgba(247,248,246,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 20px calc(12px + var(--safe-bottom));display:flex;gap:10px;z-index:30}
.btn-back-sp{flex:1;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--text);cursor:pointer}
.btn-nxt-sp{flex:2;padding:13px;background:var(--green);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-nxt-sp:active{opacity:.85}
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}
</style>

    sleepData = s.sleepData||{}; expandedExam = s.expandedExam||{};
    if(s.avatars){
      s.avatars.forEach(function(a,i){
        if(PD[i]){ PD[i].avatarImg = a.avatarImg||''; PD[i].progressPhotos = a.progressPhotos||PD[i].progressPhotos; }
      });
    }

  }catch(e){ return false; }
}

function showScreen(id){
  // Guard: redirect to login if not authenticated and trying to access main screens
  var mainScreens = ['home','treinos','dieta','sono','exames'];
  if(mainScreens.indexOf(id) !== -1 && !currentUser && fbAuth && firebaseConfig.apiKey !== 'FIREBASE_API_KEY'){
    showLoginScreen();
    return;
  }
  curScreen = id;
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
  var nav = document.getElementById('bottom-nav');
  nav.style.display = (id==='setup' || id==='login') ? 'none' : 'flex';
  document.querySelectorAll('.nav-item').forEach(function(b){
    var isA = b.dataset.screen === id;
    b.classList.toggle('active', isA);
    b.querySelector('.nav-label').style.color = isA ? 'var(--green)' : 'var(--muted)';
  });
  var rmap = {home:renderHome, treinos:renderTreinos, dieta:renderDieta, sono:renderSono, exames:renderExames};
  if(rmap[id]) rmap[id]();
}

document.querySelectorAll('.nav-item').forEach(function(btn){
  btn.addEventListener('click', function(){ showScreen(this.dataset.screen); });
});

function renderProfiles(containerId){
  var h = '';
  PD.forEach(function(p,i){
    h += '<button class="profile-btn" data-pi="'+i+'">';
    h += '<div class="avatar'+(i===curP?' active':'')+'" style="background:'+p.avatarBg+';color:'+p.avatarCl+'">';
    if(p.avatarImg) h += '<img src="'+p.avatarImg+'" alt="'+p.name+'">';
    else h += p.initials;
    h += '</div>';
    h += '<span class="pname">'+p.name+'</span></button>';
  });
  var el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = h;
  el.querySelectorAll('.profile-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      curP = parseInt(this.dataset.pi);
      save();
      renderProfiles(containerId);
      var rmap = {home:renderHome, treinos:renderTreinos, dieta:renderDieta, sono:renderSono, exames:renderExames};
      if(rmap[curScreen]) rmap[curScreen]();
    });
  });
}

function renderDieta(){

  document.getElementById('dieta-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var tabs = ['all','cafe','almoco','jantar','supp'];

    th += '<button class="tab" style="'+(dietaTab===t?'background:var(--green);color:#fff;border-color:var(--green)':'')+'" data-dtab="'+t+'">'+labels[i]+'</button>';
  });

    btn.addEventListener('click', function(){ dietaTab=this.dataset.dtab; renderDieta(); });

function renderDietaContent(){
  var p = PD[curP]; var h = '';
  var mDone = p.meals.filter(function(m){ return mealDone[curP+'-'+m.id]; }).length;
  var sDone = p.supps.filter(function(_,i){ return suppDone[curP+'-'+i]; }).length;
  var wk2 = curP+'-water'; var glasses = waterGlasses[wk2]||0; var totalG = Math.round(p.water/250);

  if(dietaTab==='all'||dietaTab==='cafe'||dietaTab==='almoco'||dietaTab==='jantar'){
    var tot = p.protein*4+p.carbs*4+p.fat*9;
    var pp = Math.round(p.protein*4/tot*100); var cp = Math.round(p.carbs*4/tot*100); var fp = Math.round(p.fat*9/tot*100);
    var r=38,cx=44,cy=44,circ=2*Math.PI*r,g=2;
    var pd2=circ*pp/100, cd2=circ*cp/100, fd2=circ*fp/100;
    h += '<div class="section"><div class="macro-card">';
    h += '<div class="ring-wrap"><svg width="88" height="88" viewBox="0 0 88 88">';
    h += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#f0f0ed" stroke-width="8"/>';
    h += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1a7a4a" stroke-width="8" stroke-dasharray="'+(pd2-g)+' '+(circ-pd2+g)+'" stroke-dashoffset="0"/>';
    h += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#c47a1a" stroke-width="8" stroke-dasharray="'+(cd2-g)+' '+(circ-cd2+g)+'" stroke-dashoffset="'+(-pd2)+'"/>';
    h += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1a5a8a" stroke-width="8" stroke-dasharray="'+(fd2-g)+' '+(circ-fd2+g)+'" stroke-dashoffset="'+(-(pd2+cd2))+'"/>';
    h += '</svg><div class="ring-center"><div class="ring-kcal">'+p.calories+'</div><div class="ring-lbl">kcal</div></div></div>';
    h += '<div class="macros-detail">';

function renderSonoContent(){
  var p = PD[curP];
  var entry = sleepData[curP] || {hours:p.sleep, quality:3};

  h += '<div class="section"><div class="score-hero">';
  h += '<div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.08em;font-family:DM Mono,monospace;margin-bottom:6px">Score de sono</div>';

  h += '<div style="display:flex;align-items:center;gap:10px">';

  h += '</div></div>';

  h += '<span style="font-size:14px;font-weight:500">Qualidade</span>';
  h += '<div style="display:flex;gap:6px">';

    var sel = entry.quality===i+1;
    h += '<button style="width:34px;height:34px;border-radius:8px;border:1.5px solid '+(sel?'var(--indigo)':'var(--border)')+';background:'+(sel?'var(--indigo-light)':'var(--surface)')+';font-size:18px;cursor:pointer" data-q="'+(i+1)+'">'+em+'</button>';
  });
  h += '</div></div></div></div>';

  h += '<div class="section"><div class="sec-label">Habitos de sono</div>';
  p.habits.forEach(function(hab,i){
    var key = curP+'-'+i; var done = !!habitDone[key];
    h += '<div class="habit-item" data-hkey="'+key+'">';
    h += '<span class="habit-icon-lbl">'+hab.icon+'</span>';
    h += '<div class="habit-info"><div class="habit-name'+(done?' done':'')+'">'+hab.name+'</div><div class="habit-tip">'+hab.tip+'</div></div>';
    h += '<div class="hcheck'+(done?' done':'')+'"></div></div>';
  });
  h += '</div>';

  h += '<div class="section"><div class="ai-card indigo"><div class="ai-hdr"><div class="ai-dot indigo"></div><span class="ai-ttl indigo">Sono IA</span></div>';
  h += '<div class="ai-txt indigo">'+p.insight+'</div></div></div>';

  h += '<button class="act-btn" id="s-prot"><span class="act-icon">🌙</span><span class="act-lbl">Protocolo</span><span class="act-sub">Rotina noturna</span></button>';
  h += '<button class="act-btn" id="s-supp"><span class="act-icon">💊</span><span class="act-lbl">Suplementos</span><span class="act-sub">Para dormir melhor</span></button>';
  h += '</div></div>';

  document.getElementById('sono-content').innerHTML = h;

  var entry2 = sleepData[curP] || {hours:p.sleep, quality:3};
  document.getElementById('s-minus').addEventListener('click', function(){
    entry2.hours = Math.max(0, parseFloat((entry2.hours-.5).toFixed(1)));

  var sp2=document.getElementById('s-prot'); var ss=document.getElementById('s-supp'); var sa=document.getElementById('s-analise');
  if(sp2) sp2.addEventListener('click', function(){ openChat('sono','Crie um protocolo de rotina noturna para '+p.name+', '+p.age+' anos, que dorme em media '+entry.hours+'h. Meta: '+p.sleepTarget+'h.'); });

  if(sa) sa.addEventListener('click', function(){ openChat('sono','Analise o padrao de sono de '+p.name+': '+entry.hours+'h, qualidade '+entry.quality+'/5, meta '+p.sleepTarget+'h. Score: '+score+'.'); });
}

function openWeight(key,exName,cur){
  weightKey=key; weightExName=exName;
  document.getElementById('wmodal-ex').textContent = exName;
  document.getElementById('wmodal-inp').value = cur||'';
  document.getElementById('wmodal-back').classList.add('open');
  setTimeout(function(){ document.getElementById('wmodal-inp').focus(); },100);
}
function closeWeight(){ document.getElementById('wmodal-back').classList.remove('open'); }
function saveWeight(){
  var val = parseFloat(document.getElementById('wmodal-inp').value);
  if(!isNaN(val)&&val>=0){ exWeights[weightKey]=val; save(); showToast('Peso atualizado: '+val+'kg'); }
  closeWeight();
  if(curScreen==='treinos') renderTreinosContent();
}
document.getElementById('wmodal-back').addEventListener('click', function(e){ if(e.target===this) closeWeight(); });

function openChat(ctx, initialMsg){
  chatCtx = ctx; chatHistory = [];

  document.getElementById('chat-sub').textContent = p.name+' · '+p.age+' anos · '+p.goal;
  document.getElementById('chat-msgs').innerHTML = '';
  var qp = CHAT_QPS[ctx]||CHAT_QPS.saude;
  var qh = '';
  qp.forEach(function(q){ qh += '<button class="qp" data-cq="'+q+'">'+q+'</button>'; });

function addChatMsg(role, text){
  var msgs = document.getElementById('chat-msgs');
  var time = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var div = document.createElement('div'); div.className='msg '+role;
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  div.innerHTML = '<div class="msg-bbl">'+safe+'</div><div class="msg-time">'+time+'</div>';
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  var msgs = document.getElementById('chat-msgs');
  var div = document.createElement('div'); div.className='msg assistant'; div.id='typing';
  div.innerHTML = '<div class="typing-wrap"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){ var t=document.getElementById('typing'); if(t) t.remove(); }

function sendQuick(text){ document.getElementById('chat-inp').value=text; sendMsg(); }
function sendMsg(){
  var inp = document.getElementById('chat-inp'); var text = inp.value.trim();
  if(!text||isTyping) return;
  inp.value=''; inp.style.height='auto';
  addChatMsg('user',text); chatHistory.push({role:'user',content:text});
  isTyping=true; document.getElementById('send-btn').disabled=true; showTyping();
  fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:getSysProm(),messages:chatHistory})
  }).then(function(res){ return res.json(); }).then(function(data){
    hideTyping();
    if(data.content&&data.content[0]&&data.content[0].text){
      var reply=data.content[0].text; addChatMsg('assistant',reply); chatHistory.push({role:'assistant',content:reply});
    } else { addChatMsg('assistant','Desculpe, tive um problema. Tente novamente.'); }
    isTyping=false; document.getElementById('send-btn').disabled=false;
  }).catch(function(){
    hideTyping(); addChatMsg('assistant','Erro de conexao. Verifique sua internet.');
    isTyping=false; document.getElementById('send-btn').disabled=false;
  });
}

document.getElementById('chat-inp').addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } });

function spRender(){
  var m = SP_META[spStep-1];
  var stepsH = '';
  for(var si=0;si<SP_TOTAL;si++){
    stepsH += '<div class="sp-step'+(si<spStep-1?' done':si===spStep-1?' active':'')+'"</div>';
  }
  document.getElementById('sp-steps').innerHTML = stepsH;
  document.getElementById('sp-lbl').innerHTML = 'Etapa <span>'+spStep+' de '+SP_TOTAL+'</span> — '+m.label;
  document.getElementById('sp-back').style.display = spStep===1?'none':'block';
  var nxt = document.getElementById('sp-next');
  nxt.textContent = spStep===SP_TOTAL ? 'Gerar meu plano ✨' : 'Continuar →';
  nxt.onclick = spStep===SP_TOTAL ? spGenerate : spNext;

  var fns = [spS1,spS2,spS3,spS4,spS5,spS6,spS7];
  document.getElementById('sp-content').innerHTML = '<div class="sp-hdr"><div class="sp-num">'+spStep+' / '+SP_TOTAL+'</div><div class="sp-ttl">'+m.ttl+'</div><div class="sp-sub">'+m.sub+'</div></div>'+fns[spStep-1]();
  window.scrollTo(0,0);

  document.querySelectorAll('.chip[data-sf]').forEach(function(el){
    el.addEventListener('click', function(){ setSF(this.dataset.sf,this.dataset.sv,this); });
  });
  document.querySelectorAll('.chip[data-ma]').forEach(function(el){
    el.addEventListener('click', function(){ toggleMA(this.dataset.ma,this.dataset.mv,this); });
  });
  document.querySelectorAll('.cdot').forEach(function(el,i){
    el.addEventListener('click', function(){ spSetColor(i); });
  });
  var avBtn = document.getElementById('sp-av');
  if(avBtn) avBtn.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  var avBtn2 = document.getElementById('sp-av-wrap');
  if(avBtn2) avBtn2.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  var avUploadBtn = document.getElementById('sp-av-upload-btn');
  if(avUploadBtn) avUploadBtn.addEventListener('click', function(){ document.getElementById('file-avatar').click(); });
  document.querySelectorAll('[data-angle]').forEach(function(slot){
    slot.addEventListener('click', function(){
      var angle = this.dataset.angle;
      var inp = document.getElementById('file-body-'+angle);
      if(!inp) return;
      inp.onchange = function(e){
        var file = e.target.files[0]; if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev){ P.bodyPhotos[angle]=ev.target.result; spRender(); };
        reader.readAsDataURL(file);
        inp.onchange = null;
      };
      inp.click();
    });
  });
}

    '</div>';
}

    if(P.bodyPhotos.lado) userContent.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:P.bodyPhotos.lado.split(',')[1]||P.bodyPhotos.lado}});
    if(P.bodyPhotos.costas) userContent.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:P.bodyPhotos.costas.split(',')[1]||P.bodyPhotos.costas}});
    userContent.push({type:'text',text:'Analise as fotos do corpo acima e gere um plano de saude 100% personalizado. Inclua: 1) Analise da composicao corporal vista nas fotos (pontos fortes e areas a desenvolver) 2) Top 3 prioridades com base no corpo e nos objetivos 3) Nutricao personalizada (calorias e macros) 4) Plano de treino semanal com musculacao + cardio baseado na composicao corporal 5) Top 5 suplementos com doses 6) Alerta principal.\n\n'+profileText+'\n\nResposta em portugues, pratica, personalizada com base nas fotos, max 600 palavras.'});
  } else {
    userContent = 'Gere um plano de saude personalizado. Inclua: 1) Analise do perfil 2) Top 3 prioridades 3) Nutricao (calorias e macros) 4) Plano de treino semanal (musculacao + cardio combinado) 5) Top 5 suplementos com doses 6) Alerta principal.\n\n'+profileText+'\n\nResposta em portugues, pratica, max 500 palavras.';
  }
  fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:userContent}]})
  }).then(function(r){ return r.json(); }).then(function(data){
    spin.style.display='none';
    if(data.content&&data.content[0]&&data.content[0].text){
      ttl.textContent='✨ Plano gerado!'; sub.textContent='Salve para comecar a usar.';
      res.innerHTML = data.content[0].text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');

    ttl.textContent='Erro de conexao'; sub.textContent='Verifique sua internet e tente novamente.';

function spSave(){
  if(P.name) PD[curP].name = P.name;
  if(P.initials) PD[curP].initials = P.initials;
  PD[curP].avatarBg = P.avatarBg;
  PD[curP].avatarCl = P.avatarCl;
  if(P.avatarImg) PD[curP].avatarImg = P.avatarImg;
  if(P.age) PD[curP].age = parseInt(P.age);
  if(P.weight) PD[curP].weight = parseFloat(P.weight);
  if(P.height) PD[curP].height = parseInt(P.height);
  if(P.goals.length){
    PD[curP].goal = P.goals.map(function(g){ var f=GOALS.find(function(x){return x.v===g;}); return f?f.l:g; }).join(' + ');
  }
  save(); showToast('Perfil salvo!');
  showScreen('home');
}

// SWIPE NAVIGATION
// ══════════════════════════════════════════════════════════════
var SCREEN_ORDER = ['home','treinos','dieta','sono','exames'];
var swTouchX = 0, swTouchY = 0, swLocked = false;

document.addEventListener('touchstart', function(e){
  swTouchX = e.touches[0].clientX;
  swTouchY = e.touches[0].clientY;
  swLocked = false;
}, {passive:true});

document.addEventListener('touchend', function(e){
  if(swLocked) return;
  var dx = e.changedTouches[0].clientX - swTouchX;
  var dy = e.changedTouches[0].clientY - swTouchY;

  // Must be clearly horizontal (dx dominant) and long enough
  if(Math.abs(dx) < 50) return;
  if(Math.abs(dy) > Math.abs(dx) * 0.7) return;

  // Skip if modals open
  if(document.getElementById('chat-back').classList.contains('open')) return;
  if(document.getElementById('wmodal-back').classList.contains('open')) return;
  if(curScreen === 'setup' || curScreen === 'login') return;

  // Skip if touch started inside a horizontal scrollable element
  var el = e.target;
  while(el && el.tagName !== 'BODY'){
    if(el.scrollWidth > el.clientWidth + 5) return;
    el = el.parentElement;
  }

  var idx = SCREEN_ORDER.indexOf(curScreen);
  if(idx === -1) return;
  swLocked = true;
  if(dx < 0 && idx < SCREEN_ORDER.length - 1){
    showScreen(SCREEN_ORDER[idx + 1]);
  } else if(dx > 0 && idx > 0){
    showScreen(SCREEN_ORDER[idx - 1]);
  }
}, {passive:true});

// ── AUTH STATE ────────────────────────────────────────────────
var currentUser = null;

function initAuth(){
  if(!fbAuth) { showScreen('home'); return; }
  fbAuth.onAuthStateChanged(function(user){
    if(user){
      currentUser = user;
      loadUserData(user.uid, function(){
        showScreen('home');

    } else {

function showLoginScreen(){

var authMode = 'login';
function switchTab(mode){
  authMode = mode;
  var tl = document.getElementById('tab-login');

function togglePass(){
  var inp = document.getElementById('auth-pass');

}

function clearAuthMsgs(){
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

function showAuthError(msg){
  var el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}

function showAuthSuccess(msg){
  var el = document.getElementById('auth-success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}

function getAuthErrorMsg(code){
  var msgs = {
    'auth/user-not-found': 'Email nao encontrado. Verifique ou crie uma conta.',
    'auth/wrong-password': 'Senha incorreta. Tente novamente.',
    'auth/email-already-in-use': 'Este email ja tem uma conta. Faca login.',
    'auth/weak-password': 'Senha muito fraca. Use pelo menos 6 caracteres.',
    'auth/invalid-email': 'Email invalido. Verifique o formato.',
    'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
    'auth/network-request-failed': 'Erro de conexao. Verifique sua internet.',
    'auth/invalid-credential': 'Email ou senha incorretos. Tente novamente.',
  };
  return msgs[code] || 'Erro ao autenticar. Tente novamente.';
}

function doAuth(){
  var email = document.getElementById('auth-email').value.trim();
  var pass = document.getElementById('auth-pass').value;
  clearAuthMsgs();

  if(!email || !pass){ showAuthError('Preencha email e senha.'); return; }
  if(pass.length < 6){ showAuthError('Senha deve ter pelo menos 6 caracteres.'); return; }

  var btn = document.getElementById('auth-btn');
  btn.textContent = authMode === 'login' ? 'Entrando...' : 'Criando conta...';
  btn.disabled = true;

  if(!fbAuth){
    // Firebase not configured - go straight to app (dev mode)
    showToast('Modo desenvolvimento - Firebase nao configurado');
    showScreen('home');
    btn.disabled = false;
    return;
  }

  if(authMode === 'login'){
    fbAuth.signInWithEmailAndPassword(email, pass)
      .then(function(cred){
        currentUser = cred.user;
        btn.textContent = 'Entrar'; btn.disabled = false;
        var nome = (cred.user.displayName || cred.user.email).split(' ')[0];
        showToast('Bem-vindo, ' + nome + '! 👋');
        loadUserData(cred.user.uid, function(){ showScreen('home'); });
      })
      .catch(function(err){
        btn.textContent = 'Entrar'; btn.disabled = false;
        showAuthError(getAuthErrorMsg(err.code));
      });
  } else {
    var name = document.getElementById('auth-name').value.trim();
    if(!name){ showAuthError('Digite seu nome.'); btn.textContent = 'Criar conta'; btn.disabled = false; return; }
    fbAuth.createUserWithEmailAndPassword(email, pass)
      .then(function(cred){
        currentUser = cred.user;
        return cred.user.updateProfile({displayName: name});
      })
      .then(function(){
        btn.textContent = 'Criar conta'; btn.disabled = false;
        spStep = 1;
        showScreen('setup');
        document.getElementById('bottom-nav').style.display = 'none';
        spRender();
      })
      .catch(function(err){
        btn.textContent = 'Criar conta'; btn.disabled = false;
        showAuthError(getAuthErrorMsg(err.code));
      });
  }
}

function forgotPass(){
  var email = document.getElementById('auth-email').value.trim();
  if(!email){ showAuthError('Digite seu email primeiro.'); return; }
  if(!fbAuth){ showAuthSuccess('Email enviado! (modo dev)'); return; }
  fbAuth.sendPasswordResetEmail(email)
    .then(function(){ showAuthSuccess('Email de recuperacao enviado para ' + email); })
    .catch(function(err){ showAuthError(getAuthErrorMsg(err.code)); });
}

// ── FIRESTORE SYNC ────────────────────────────────────────────
function loadUserData(uid, callback){
  if(!fbDb){ if(callback) callback(); return; }
  var done = false;
  // Timeout: if Firestore takes more than 5s, proceed anyway
  var timer = setTimeout(function(){
    if(!done){ done = true; if(callback) callback(); }
  }, 5000);
  fbDb.collection('users').doc(uid).get()
    .then(function(doc){
      if(done) return;
      done = true; clearTimeout(timer);
      if(doc.exists){
        var data = doc.data();
        if(data.appState){
          try{
            var s = data.appState;
            curP = s.curP||0; curDay = s.curDay||curDay;
            mealDone = s.mealDone||{}; suppDone = s.suppDone||{};
            habitDone = s.habitDone||{}; exChecked = s.exChecked||{};
            exWeights = s.exWeights||{}; cardioSel = s.cardioSel||{};
            cardioChecked = s.cardioChecked||{}; waterGlasses = s.waterGlasses||{};
            sleepData = s.sleepData||{}; expandedExam = s.expandedExam||{};
          }catch(e){}
        }
      }
      if(callback) callback();
    })
    .catch(function(){ if(!done){ done=true; clearTimeout(timer); if(callback) callback(); } });
}

function saveToCloud(){
  if(!fbAuth || !fbAuth.currentUser || !fbDb) return;
  var uid = fbAuth.currentUser.uid;
  var appState = {
    curP:curP, curDay:curDay, mealDone:mealDone, suppDone:suppDone,
    habitDone:habitDone, exChecked:exChecked, exWeights:exWeights,
    cardioSel:cardioSel, cardioChecked:cardioChecked,
    waterGlasses:waterGlasses, sleepData:sleepData, expandedExam:expandedExam,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  fbDb.collection('users').doc(uid).set({appState:appState}, {merge:true})
    .catch(function(e){ console.log('Firestore save error:', e); });
}
